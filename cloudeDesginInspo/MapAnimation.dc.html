<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;1,6..96,500&family=Outfit:wght@400;600;700&family=Heebo:wght@400;700&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
  @keyframes iphRot{0%{transform:perspective(700px) rotateY(-62deg) rotateX(18deg) scale(.55);opacity:0}20%{transform:perspective(700px) rotateY(9deg) rotateX(-5deg) scale(1.04);opacity:1}28%{transform:perspective(700px) rotateY(-3deg) rotateX(1deg) scale(1);opacity:1}34%,92%{transform:perspective(700px) rotateY(0deg) rotateX(0deg) scale(1);opacity:1}100%{transform:perspective(700px) rotateY(-62deg) rotateX(18deg) scale(.55);opacity:0}}
  @keyframes mapIn2{0%,17%{opacity:0}28%,92%{opacity:1}100%{opacity:0}}
  @keyframes scrOut{0%,17%{opacity:1}28%,100%{opacity:0}}
  @keyframes pin1A{0%,26%{opacity:0;transform:translateY(30px) scale(0)}32%{opacity:1;transform:translateY(-46px) scale(1.35)}38%{transform:translateY(-20px) scale(.88)}42%{opacity:1;transform:translateY(-30px) scale(1)}50%,62%{transform:translateY(-36px) scale(1)}56%,68%{transform:translateY(-26px) scale(1)}90%{opacity:1;transform:translateY(-30px) scale(1)}96%,100%{opacity:0;transform:translateY(30px) scale(0)}}
  @keyframes pin2A{0%,34%{opacity:0;transform:translateY(30px) scale(0)}40%{opacity:1;transform:translateY(-46px) scale(1.35)}46%{transform:translateY(-20px) scale(.88)}50%{opacity:1;transform:translateY(-30px) scale(1)}57%,69%{transform:translateY(-36px) scale(1)}63%,75%{transform:translateY(-26px) scale(1)}90%{opacity:1;transform:translateY(-30px) scale(1)}96%,100%{opacity:0;transform:translateY(30px) scale(0)}}
  @keyframes pin3A{0%,42%{opacity:0;transform:translateY(30px) scale(0)}48%{opacity:1;transform:translateY(-46px) scale(1.35)}54%{transform:translateY(-20px) scale(.88)}58%{opacity:1;transform:translateY(-30px) scale(1)}64%,76%{transform:translateY(-36px) scale(1)}70%,82%{transform:translateY(-26px) scale(1)}90%{opacity:1;transform:translateY(-30px) scale(1)}96%,100%{opacity:0;transform:translateY(30px) scale(0)}}
  @keyframes pin4A{0%,50%{opacity:0;transform:translateY(30px) scale(0)}56%{opacity:1;transform:translateY(-46px) scale(1.35)}62%{transform:translateY(-20px) scale(.88)}66%{opacity:1;transform:translateY(-30px) scale(1)}71%,83%{transform:translateY(-36px) scale(1)}77%,89%{transform:translateY(-26px) scale(1)}90%{opacity:1;transform:translateY(-30px) scale(1)}96%,100%{opacity:0;transform:translateY(30px) scale(0)}}
  @keyframes pin5A{0%,58%{opacity:0;transform:translateY(30px) scale(0)}64%{opacity:1;transform:translateY(-46px) scale(1.35)}70%{transform:translateY(-20px) scale(.88)}74%{opacity:1;transform:translateY(-30px) scale(1)}78%,90%{transform:translateY(-36px) scale(1)}84%,92%{transform:translateY(-26px) scale(1)}94%{opacity:1;transform:translateY(-30px) scale(1)}97%,100%{opacity:0;transform:translateY(30px) scale(0)}}
  @keyframes bgGlow{0%,100%{opacity:.08}50%{opacity:.22}}
</style>
</helmet>

<section style="position:relative;height:480px;overflow:hidden;background:linear-gradient(135deg,#4a2a1f,#3a1f15);display:flex;align-items:center;justify-content:center;">
  <div style="position:relative;width:100%;height:100%;background:linear-gradient(135deg,rgba(114,8,21,.3),rgba(96,62,53,.2));display:flex;align-items:center;justify-content:center;">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:visible;">
      <div style="position:absolute;width:260px;height:260px;background:radial-gradient(circle,rgba(236,200,115,.45),transparent 70%);border-radius:50%;animation:bgGlow 3s 1.2s ease-in-out infinite;pointer-events:none;"></div>
      <div style="animation:iphRot 5s ease-in-out infinite;transform-origin:50% 58%;">
        <div style="position:relative;width:148px;height:288px;background:linear-gradient(160deg,#3e3e40,#1c1c1e);border-radius:32px;box-shadow:0 0 0 1.5px rgba(255,255,255,.13) inset,0 0 0 1.5px #080808,0 50px 90px -30px rgba(0,0,0,.95),6px 12px 40px rgba(0,0,0,.6);">
          <div style="position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(160deg,rgba(255,255,255,.07) 0%,transparent 70%);border-radius:32px 32px 0 0;pointer-events:none;z-index:40;"></div>
          <div style="position:absolute;left:-3px;top:74px;width:3px;height:32px;background:#2a2a2c;border-radius:2px 0 0 2px;"></div>
          <div style="position:absolute;left:-3px;top:116px;width:3px;height:26px;background:#2a2a2c;border-radius:2px 0 0 2px;"></div>
          <div style="position:absolute;right:-3px;top:94px;width:3px;height:44px;background:#2a2a2c;border-radius:0 2px 2px 0;"></div>
          <div style="position:absolute;top:8px;left:8px;right:8px;bottom:8px;border-radius:24px;overflow:hidden;background:#1c1c1e;">
            <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:20px;background:#1c1c1e;border-radius:0 0 12px 12px;z-index:22;"></div>
            <div style="position:absolute;inset:0;background:#1c1c1e;z-index:20;animation:scrOut 5s ease-in-out infinite;"></div>
            <div style="position:absolute;inset:0;animation:mapIn2 5s ease-in-out infinite;opacity:0;z-index:2;">
              <div style="width:100%;height:100%;background:#eaf2eb;position:relative;overflow:hidden;">
                <div style="position:absolute;right:0;top:0;bottom:0;width:18%;background:linear-gradient(90deg,#c8e6f5,#a8d8f0);"></div>
                <div style="position:absolute;left:0;right:0;top:30%;height:7px;background:#fff;opacity:.95;"></div>
                <div style="position:absolute;left:0;right:0;top:54%;height:5px;background:#fff;opacity:.85;"></div>
                <div style="position:absolute;left:0;right:0;top:74%;height:6px;background:#fff;opacity:.85;"></div>
                <div style="position:absolute;top:0;bottom:0;left:26%;width:7px;background:#fff;opacity:.95;"></div>
                <div style="position:absolute;top:0;bottom:0;left:58%;width:5px;background:#fff;opacity:.8;"></div>
                <div style="position:absolute;top:5%;left:3%;width:18%;height:22%;background:#c0d4bb;border-radius:3px;"></div>
                <div style="position:absolute;top:5%;left:32%;width:20%;height:22%;background:#b4cdb0;border-radius:3px;"></div>
                <div style="position:absolute;top:5%;left:63%;width:16%;height:22%;background:#c8dac4;border-radius:3px;"></div>
                <div style="position:absolute;top:37%;left:3%;width:18%;height:14%;background:#c0d4bb;border-radius:3px;"></div>
                <div style="position:absolute;top:37%;left:32%;width:20%;height:14%;background:#b4cdb0;border-radius:3px;"></div>
                <div style="position:absolute;top:37%;left:63%;width:16%;height:14%;background:#c8dac4;border-radius:3px;"></div>
                <div style="position:absolute;top:60%;left:3%;width:18%;height:11%;background:#c0d4bb;border-radius:3px;"></div>
                <div style="position:absolute;top:60%;left:32%;width:20%;height:11%;background:#b4cdb0;border-radius:3px;"></div>
                <div style="position:absolute;top:80%;left:3%;width:18%;height:18%;background:#c0d4bb;border-radius:3px;"></div>
                <div style="position:absolute;top:80%;left:32%;width:20%;height:18%;background:#b4cdb0;border-radius:3px;"></div>
                <div style="position:absolute;top:80%;left:63%;width:16%;height:18%;background:#c8dac4;border-radius:3px;"></div>
                <div style="position:absolute;bottom:5px;left:0;right:20%;text-align:center;font:700 8px/1 'Outfit',sans-serif;color:rgba(60,80,60,.55);letter-spacing:.5px;">Tel Aviv</div>
              </div>
            </div>
          </div>
          <div style="position:absolute;top:72px;left:38px;animation:pin1A 5s ease-in-out infinite;opacity:0;z-index:50;filter:drop-shadow(0 6px 10px rgba(220,38,38,.65));"><div style="width:20px;height:20px;background:#dc2626;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;"></div></div>
          <div style="position:absolute;top:128px;left:88px;animation:pin2A 5s ease-in-out infinite;opacity:0;z-index:50;filter:drop-shadow(0 6px 10px rgba(200,150,40,.65));"><div style="width:18px;height:18px;background:#ECC873;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;"></div></div>
          <div style="position:absolute;top:164px;left:52px;animation:pin3A 5s ease-in-out infinite;opacity:0;z-index:50;filter:drop-shadow(0 6px 10px rgba(220,38,38,.65));"><div style="width:16px;height:16px;background:#dc2626;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;"></div></div>
          <div style="position:absolute;top:88px;left:106px;animation:pin4A 5s ease-in-out infinite;opacity:0;z-index:50;filter:drop-shadow(0 6px 10px rgba(200,150,40,.65));"><div style="width:16px;height:16px;background:#ECC873;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;"></div></div>
          <div style="position:absolute;top:190px;left:22px;animation:pin5A 5s ease-in-out infinite;opacity:0;z-index:50;filter:drop-shadow(0 6px 10px rgba(220,38,38,.65));"><div style="width:14px;height:14px;background:#dc2626;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;"></div></div>
        </div>
      </div>
    </div>
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(28,12,9,.05) 0%,rgba(28,12,9,.75) 100%);pointer-events:none;"></div>
  </div>
  <div style="position:absolute;left:0;right:0;bottom:0;padding:0 30px 42px;color:#f9f6eb;" dir="{{ dir }}">
    <div style="font:600 10px/1 'Outfit',sans-serif;letter-spacing:3px;text-transform:uppercase;color:#ECC873;margin-bottom:14px;">{{ mapk }}</div>
    <h2 style="margin:0;font-family:'Bodoni Moda','Frank Ruhl Libre',serif;font-weight:700;font-size:38px;line-height:.98;letter-spacing:-1px;">{{ mapL1 }}<br>{{ mapL2 }}</h2>
    <p style="margin:14px 0 22px;font-size:14px;line-height:1.5;color:#f0e7d6;max-width:250px;">{{ maps }}</p>
    <a href="#" style="display:inline-flex;align-items:center;gap:10px;background:#ECC873;color:#3a1410;font:700 14px/1 'Outfit','Heebo',sans-serif;padding:15px 26px;border-radius:999px;text-decoration:none;box-shadow:0 14px 30px -10px rgba(0,0,0,.5);"><i class="fas fa-location-dot"></i><span>{{ mapc }}</span></a>
  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:480},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;he&quot;],&quot;default&quot;:&quot;en&quot;,&quot;tsType&quot;:&quot;'en'|'he'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const he = this.props.lang === 'he';
    return {
      dir: he ? 'rtl' : 'ltr',
      mapk: he ? 'מפה חיה' : 'Live map',
      mapL1: he ? 'מפת האפי' : 'The Happy',
      mapL2: he ? 'האוור' : 'Hour Map',
      maps: he ? 'כל דיל שווה בעיר, מסומן במקום אחד.' : 'Every great deal in the city, pinned in one place.',
      mapc: he ? 'פתחו את המפה' : 'Open the map'
    };
  }
}
</script>
</body>
</html>
