<!-- Blog Category Menu -->
<style>
    .blog-pill-dropdown {
        position: relative;
        flex: 0 0 auto;
    }

    .pill-dropdown-menu {
        display: none;
        position: fixed;
        background: #faf5e6;
        border: 1px solid #ece1cb;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(54, 33, 24, .12);
        min-width: 155px;
        z-index: 9999;
        padding: 6px 0;
        overflow: hidden;
    }

    .pill-dropdown-menu a {
        display: block;
        padding: 9px 18px;
        font-family: 'Outfit', 'Assistant', sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #362118;
        text-decoration: none;
        white-space: nowrap;
        transition: background .15s;
    }

    .pill-dropdown-menu a:hover {
        background: rgba(96, 62, 53, .1);
        color: #603e35;
    }
    .account-widget { position: fixed; top: 10px; right: 12px; z-index: 10000; display: flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif; font-size: 13px; }
    .account-widget a, .account-widget .account-chip { background: rgba(255, 255, 255, .85); padding: 5px 11px; border-radius: 999px; box-shadow: 0 2px 8px rgba(54, 33, 24, .10); white-space: nowrap; }
    .account-widget .account-chip { color: #362118; font-weight: 600; max-width: 40vw; overflow: hidden; text-overflow: ellipsis; }
    .account-widget a { color: #603e35; font-weight: 700; text-decoration: none; }
    .account-widget a:hover { color: #362118; }
</style>

<!-- Account status (fixed top-right, all pages) -->
<div class="account-widget" dir="ltr">
    {% if current_user %}
    <span class="account-chip"><i class="fas fa-user-circle"></i> {{ current_user.name or current_user.email }}</span>
    <a href="{{ url_for('accounts.logout') }}"><i class="fas fa-sign-out-alt"></i> Log out</a>
    {% else %}
    <a href="{{ url_for('accounts.login') }}"><i class="fas fa-user"></i> Log in</a>
    {% endif %}
</div>

<div class="blog-category-menu" dir="ltr">
    {% if active_page != 'home' %}
    <div class="blog-menu-header"
        style="display: flex; justify-content: center; align-items: center; gap: 12px; padding: 0 20px; margin-bottom: 0;">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Ofoodiez Logo"
            style="width: 54px; border-radius: 50%;">
        <span
            style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.7rem; color: var(--text-color, #362118);">Ofoodiez</span>
    </div>
    {% endif %}
    <span class="blog-category-label">Explore the blog</span>
    <div class="category-scroll-container">
        <a href="/" class="category-pill {% if active_page == 'home' %}active{% endif %}">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="/blog/bachelorette" class="category-pill {% if active_page == 'bachelorette' %}active{% endif %}">
            <i class="fas fa-glass-cheers"></i> Bachelorette Party
        </a>
        <div class="blog-pill-dropdown" id="japan-pill-wrap">
            <a href="/blog/japan" id="japan-pill-btn"
                class="category-pill {% if active_page == 'japan' %}active{% endif %}">
                <i class="fas fa-plane"></i> Japan Guide <i class="fas fa-chevron-down"
                    style="font-size:9px;opacity:.7;margin-right:2px;"></i>
            </a>
        </div>
        <a href="/blog/instagram" class="category-pill {% if active_page == 'instagram' %}active{% endif %}">
            <i class="fab fa-instagram"></i> Instagram
        </a>
    </div>
</div>

<!-- Japan dropdown — rendered outside the scroll container so overflow doesn't clip it -->
<div class="pill-dropdown-menu" id="japan-pill-menu">
    <a href="/blog/japan#intro">✍️ Intro</a>
    <a href="/blog/japan#map">🗺️ Map</a>
    <a href="/blog/japan#cities">🏙️ Cities</a>
    <a href="/blog/japan#calc">🧮 Calculator</a>
    <a href="/blog/japan#shop">🛍️ Shopping</a>
</div>

<script>
    (function () {
        var wrap = document.getElementById('japan-pill-wrap');
        var menu = document.getElementById('japan-pill-menu');
        if (!wrap || !menu) return;

        function show() {
            var r = wrap.getBoundingClientRect();
            menu.style.top = (r.bottom + 6) + 'px';
            menu.style.left = r.left + 'px';
            menu.style.display = 'block';
        }
        function hide() { menu.style.display = 'none'; }

        wrap.addEventListener('mouseenter', show);
        wrap.addEventListener('mouseleave', function (e) {
            // keep open if cursor moves into the menu itself
            if (!menu.contains(e.relatedTarget)) hide();
        });
        menu.addEventListener('mouseleave', hide);
    })();
</script>
