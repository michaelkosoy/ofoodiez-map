<!-- HiTech Section Navigation Menu -->
<style>
    .ht-menu {
        width: 100%;
        background: rgba(8, 6, 10, 0.92);
        border-bottom: 1px solid rgba(114, 8, 21, 0.25);
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9000;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 5px 0 5px;
    }

    .ht-nav-header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 6px 20px;
    }
    .ht-nav-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-decoration: none;
        grid-column: 2;
    }
    .ht-nav-brand img {
        width: 42px;
        border-radius: 50%;
    }
    .ht-nav-brand-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 1.3rem;
        color: #f9f6eb;
        white-space: nowrap;
        letter-spacing: 0.04em;
    }

    /* Pills row */
    .ht-nav-pills-row {
        display: flex;
        align-items: center;
        padding: 0 0 4px;
    }
    /* Mobile-only logo (just photo, no text) — hidden on desktop */
    .ht-nav-brand-mobile {
        display: none;
        flex-shrink: 0;
        padding: 0 6px 0 10px;
    }
    .ht-nav-brand-mobile img {
        width: 26px;
        border-radius: 50%;
        display: block;
    }
    .ht-nav-left {
        flex: 1;
        min-width: 0;
        overflow: hidden;
    }
    .ht-scroll-container {
        display: flex;
        overflow-x: auto;
        gap: 7px;
        padding: 0 12px;
        -ms-overflow-style: none;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
    }
    .ht-scroll-container::-webkit-scrollbar { display: none; }

    .ht-pill {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 5px 13px;
        background: rgba(249, 246, 235, 0.07);
        color: rgba(249, 246, 235, 0.65);
        border: 1px solid rgba(114, 8, 21, 0.2);
        border-radius: 999px;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 11.5px;
        white-space: nowrap;
        text-decoration: none;
        transition: all .2s ease;
    }
    .ht-pill i { font-size: 10px; color: inherit; }
    .ht-pill:hover {
        background: rgba(249, 246, 235, 0.12);
        color: #f9f6eb;
        transform: translateY(-1px);
    }
    .ht-pill.active {
        background: #720815;
        color: #f9f6eb;
        border-color: transparent;
        font-weight: 700;
        box-shadow: 0 2px 12px rgba(114, 8, 21, 0.4);
    }
    .pill-short { display: none; }
    .pill-full  { display: inline; }

    /* Account button in HiTech nav */
    .ht-nav-account {
        grid-column: 3;
        justify-content: flex-end;
        flex-shrink: 0;
        padding: 0 12px 0 6px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .ht-account-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 5px 12px;
        border-radius: 999px;
        background: rgba(249, 246, 235, 0.07);
        border: 1px solid rgba(114, 8, 21, 0.25);
        font-family: 'Outfit', sans-serif;
        font-size: 11.5px;
        font-weight: 700;
        color: rgba(249, 246, 235, 0.7);
        text-decoration: none;
        white-space: nowrap;
        transition: all .2s;
        cursor: pointer;
    }
    .ht-account-btn:hover { background: rgba(114, 8, 21, 0.4); color: #f9f6eb; }
    .ht-account-chip {
        font-family: 'Outfit', sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: rgba(249, 246, 235, 0.55);
        white-space: nowrap;
        max-width: 110px;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* Mobile account */
    .ht-nav-account-mobile {
        display: none;
        flex-shrink: 0;
        padding: 0 8px 0 4px;
        align-items: center;
        gap: 5px;
    }
    .ht-mobile-user-popup {
        display: none;
        position: fixed;
        background: #100810;
        border: 1px solid rgba(114, 8, 21, 0.35);
        border-radius: 12px;
        box-shadow: 0 6px 24px rgba(0,0,0,.5);
        min-width: 160px;
        z-index: 999999;
        padding: 10px 0 6px;
    }
    .ht-mobile-user-name {
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 600;
        color: rgba(249,246,235,.7);
        padding: 0 14px 8px;
        border-bottom: 1px solid rgba(114, 8, 21, 0.2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 180px;
    }
    .ht-mobile-user-logout {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 600;
        color: #9b1a2a;
        text-decoration: none;
    }

    @media (max-width: 600px) {
        .ht-nav-header { display: none; }
        .ht-nav-brand-mobile { display: flex; align-items: center; }
        .ht-nav-account-mobile { display: flex; }
        .ht-nav-pills-row { padding: 4px 0; }
        .ht-scroll-container { gap: 5px; padding: 0 6px; }
        .ht-pill { font-size: 10px; padding: 4px 9px; gap: 3px; }
        .ht-pill i { font-size: 9px; }
        .pill-full  { display: none; }
        .pill-short { display: inline; }
    }
</style>

<div class="ht-menu" dir="ltr">
    <!-- Desktop header row -->
    <div class="ht-nav-header">
        <a href="/hitech" class="ht-nav-brand">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Ofoodiez">
            <span class="ht-nav-brand-text">Ofoodiez</span>
        </a>
        <div class="ht-nav-account">
            {% if current_user %}
            <span class="ht-account-chip"><i class="fas fa-user-circle"></i> {{ current_user.name or current_user.email }}</span>
            <a href="{{ url_for('accounts.logout') }}" class="ht-account-btn"><i class="fas fa-sign-out-alt"></i> Log out</a>
            {% else %}
            <a href="{{ url_for('accounts.login') }}" class="ht-account-btn"><i class="fas fa-user"></i> Log in</a>
            {% endif %}
        </div>
    </div>

    <!-- Pills row -->
    <div class="ht-nav-pills-row">
        <!-- Mobile-only logo -->
        <div class="ht-nav-brand-mobile">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Ofoodiez">
        </div>

        <div class="ht-nav-left">
            <div class="ht-scroll-container">
                <a href="/hitech" class="ht-pill {% if active_hitech_page == 'home' %}active{% endif %}">
                    <i class="fas fa-home"></i>
                    <span class="pill-full">HiTech Home</span>
                    <span class="pill-short">Home</span>
                </a>
                <a href="/hitech/community" class="ht-pill {% if active_hitech_page == 'community' %}active{% endif %}">
                    <i class="fas fa-users"></i>
                    <span class="pill-full">Community</span>
                    <span class="pill-short">Community</span>
                </a>
                <a href="/hitech/referrals-bot" class="ht-pill {% if active_hitech_page == 'referrals-bot' %}active{% endif %}">
                    <i class="fas fa-robot"></i>
                    <span class="pill-full">Referrals Bot</span>
                    <span class="pill-short">Bot</span>
                </a>
                <a href="/hitech/cv-guide" class="ht-pill {% if active_hitech_page == 'cv-guide' %}active{% endif %}">
                    <i class="fas fa-file-alt"></i>
                    <span class="pill-full">CV Guide</span>
                    <span class="pill-short">CV</span>
                </a>
            </div>
        </div>

        <!-- Mobile account -->
        <div class="ht-nav-account-mobile" dir="ltr">
            {% if current_user %}
            <div class="mobile-user-wrap">
                <button class="ht-account-btn" id="ht-mobile-user-btn" aria-label="Account">
                    <i class="fas fa-user-circle"></i>
                </button>
                <div class="ht-mobile-user-popup" id="ht-mobile-user-popup">
                    <div class="ht-mobile-user-name"><i class="fas fa-user-circle"></i> {{ current_user.name or current_user.email }}</div>
                    <a href="{{ url_for('accounts.logout') }}" class="ht-mobile-user-logout">
                        <i class="fas fa-sign-out-alt"></i> Log out
                    </a>
                </div>
            </div>
            {% else %}
            <a href="{{ url_for('accounts.login') }}" class="ht-account-btn"><i class="fas fa-user"></i></a>
            {% endif %}
        </div>
    </div>
</div>

<script>
    (function () {
        function applyHtNavPadding() {
            var nav = document.querySelector('.ht-menu');
            if (!nav) return;
            document.body.style.paddingTop = nav.offsetHeight + 'px';
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', applyHtNavPadding);
        } else {
            applyHtNavPadding();
        }
        window.addEventListener('resize', applyHtNavPadding);
    })();

    (function () {
        var btn = document.getElementById('ht-mobile-user-btn');
        var popup = document.getElementById('ht-mobile-user-popup');
        if (!btn || !popup) return;
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            if (popup.style.display === 'block') {
                popup.style.display = 'none';
            } else {
                var r = btn.getBoundingClientRect();
                popup.style.top = (r.bottom + 6) + 'px';
                popup.style.right = (window.innerWidth - r.right) + 'px';
                popup.style.left = 'auto';
                popup.style.display = 'block';
            }
        });
        document.addEventListener('click', function () {
            if (popup) popup.style.display = 'none';
        });
    })();
</script>
