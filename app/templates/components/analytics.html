<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-L7T5RWNGFQ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-L7T5RWNGFQ');

  // Universal Click Tracker — fires a GA4 event for every meaningful click
  document.addEventListener('click', function(e) {
    var el = e.target.closest('a, button, [role="button"], .filter-btn, .sort-btn, .bottom-nav-item, .social-icon, .promo-card, .country-card, .place-card');
    if (!el) return;
    gtag('event', 'click', {
      element_tag:   el.tagName.toLowerCase(),
      element_text:  (el.innerText || el.value || '').trim().slice(0, 100),
      element_href:  el.getAttribute('href') || '',
      page_path:     window.location.pathname
    });
  }, true);
</script>
