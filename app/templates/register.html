<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Ofoodiez</title>
    <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --brand:#5A3A31; --accent:#D3A78A; --danger:#e74c3c; }
        body { font-family:'Outfit',sans-serif; background:#f9f6eb; min-height:100vh; display:flex; align-items:center; justify-content:center; margin:0; padding:20px; }
        .auth-card { background:#fff; padding:40px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); text-align:center; width:100%; max-width:400px; }
        .auth-card img { width:72px; margin-bottom:16px; }
        h2 { margin:0 0 6px; color:var(--brand); }
        .subtitle { color:#888; font-size:14px; margin-bottom:24px; }
        .form-group { margin-bottom:16px; text-align:left; }
        .form-control { width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:8px; font-family:inherit; font-size:16px; box-sizing:border-box; }
        .form-control:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 2px rgba(211,167,138,0.25); }
        .btn { width:100%; padding:12px; background:var(--brand); color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; transition:0.3s; }
        .btn:hover { opacity:0.92; }
        .flash-messages { color:var(--danger); margin-bottom:14px; font-size:14px; }
        .switch-link { margin-top:18px; font-size:14px; color:#666; }
        .switch-link a { color:var(--brand); font-weight:600; text-decoration:none; }
        .back-link { display:inline-block; margin-top:14px; font-size:13px; color:#aaa; text-decoration:none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Ofoodiez">
        <h2>Create your account</h2>
        <div class="subtitle">Register to access Ofoodiez Services</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}<div>{{ message }}</div>{% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group"><input type="text" name="name" class="form-control" placeholder="Name (optional)"></div>
            <div class="form-group"><input type="email" name="email" class="form-control" placeholder="Email" required autofocus></div>
            <div class="form-group"><input type="password" name="password" class="form-control" placeholder="Password (min 8 characters)" required minlength="8"></div>
            <button type="submit" class="btn">Create account</button>
        </form>

        <div class="switch-link">Already have an account? <a href="{{ url_for('accounts.login') }}">Log in</a></div>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to site</a>
    </div>
</body>
</html>
