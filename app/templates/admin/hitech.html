{% extends "admin/base.html" %}

{% block title %}Tech Community Members{% endblock %}

{% block content %}
<div class="header-controls">
    <h2>Tech Community Members <span id="email-count" style="font-size:1rem; font-weight:400; color:#888; margin-left:8px;"></span> <span id="verified-count" style="font-size:1rem; font-weight:400; color:#27ae60; margin-left:12px;"></span></h2>
    <div style="display:flex;gap:8px;">
        <button class="btn" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Member</button>
        <button class="btn" onclick="openEmailModal()"><i class="fas fa-envelope"></i> Send Email</button>
        <button class="btn" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
    </div>
</div>

<!-- Add Member Modal -->
<div id="add-member-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:32px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
        <h3 style="margin:0 0 20px;">Add Member</h3>
        <div style="display:flex;flex-direction:column;gap:12px;">
            <input id="add-email" type="email" placeholder="Email *" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;">
            <input id="add-linkedin" type="url" placeholder="LinkedIn URL" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;">
            <input id="add-job-title" type="text" placeholder="Job Title" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;">
            <input id="add-company" type="text" placeholder="Company" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;">
            <select id="add-gender" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;color:#555;">
                <option value="">Gender —</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select>
            <input id="add-list" type="text" placeholder="List tag (e.g. founders)" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;">
            <label style="display:flex;align-items:center;gap:8px;font-size:0.95rem;">
                <input id="add-verified" type="checkbox"> Mark as verified
            </label>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:24px;">
            <button onclick="closeAddModal()" style="padding:10px 20px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;">Cancel</button>
            <button onclick="submitAddMember()" style="padding:10px 20px;background:#5A3A31;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;">Add</button>
        </div>
    </div>
</div>

<!-- Send Email Modal -->
<div id="send-email-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:32px;width:100%;max-width:520px;box-shadow:0 8px 40px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;direction:rtl;text-align:right;">
        <h3 style="margin:0 0 20px;font-family:inherit;">שליחת מייל לחברי הקהילה</h3>
        <div style="display:flex;flex-direction:column;gap:16px;">
            <!-- Email Title / Subject -->
            <div style="display:flex;flex-direction:column;gap:4px;">
                <label style="font-size:0.85rem;font-weight:600;color:#555;">נושא המייל *</label>
                <input id="email-subject" type="text" placeholder="למשל: מפגש פודיז טק הבא!" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;font-family:inherit;">
            </div>

            <!-- Email Body Description -->
            <div style="display:flex;flex-direction:column;gap:4px;">
                <label style="font-size:0.85rem;font-weight:600;color:#555;">תוכן המייל (תומך בטקסט חופשי או HTML) *</label>
                <textarea id="email-body" rows="6" placeholder="כתבו את תוכן המייל כאן..." style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;resize:vertical;font-family:inherit;"></textarea>
            </div>

            <!-- Registration/Payment Link -->
            <div style="display:flex;flex-direction:column;gap:4px;">
                <label style="font-size:0.85rem;font-weight:600;color:#555;">קישור לכפתור הרשמה / תשלום (אופציונלי)</label>
                <input id="email-button-url" type="url" placeholder="https://..." style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;font-family:inherit;">
            </div>
            
            <div style="display:flex;flex-direction:column;gap:4px;">
                <label style="font-size:0.85rem;font-weight:600;color:#555;">טקסט לכפתור (אופציונלי)</label>
                <input id="email-button-text" type="text" placeholder="למשל: להרשמה ותשלום" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;font-family:inherit;">
            </div>

            <!-- Email Image URL -->
            <div style="display:flex;flex-direction:column;gap:4px;">
                <label style="font-size:0.85rem;font-weight:600;color:#555;">כתובת URL לתמונה (אופציונלי)</label>
                <input id="email-image-url" type="url" placeholder="https://..." style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;font-family:inherit;">
            </div>

            <!-- Recipient Criteria -->
            <div style="display:flex;flex-direction:column;gap:6px;">
                <label style="font-size:0.85rem;font-weight:600;color:#555;">קהל יעד למשלוח *</label>
                <div style="display:flex;flex-direction:column;gap:8px;font-size:0.95rem;color:#333;">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                        <input type="radio" name="email-target" value="all" checked onchange="toggleTargetFields()"> כל רשימת הקהילה
                    </label>
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                        <input type="radio" name="email-target" value="verified" onchange="toggleTargetFields()"> רשומים מאושרים (Verified) בלבד
                    </label>
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                        <input type="radio" name="email-target" value="unverified" onchange="toggleTargetFields()"> רשומים שטרם אושרו בלבד
                    </label>
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                        <input type="radio" name="email-target" value="list" onchange="toggleTargetFields()"> תגית רשימה ספציפית
                    </label>
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                        <input type="radio" name="email-target" value="specific" onchange="toggleTargetFields()"> מייל בדיקה ספציפי (למשל לצורך טסט)
                      </label>
                  </div>
              </div>
  
              <!-- List Tag Input (Conditional) -->
              <div id="target-list-group" style="display:none;flex-direction:column;gap:4px;">
                  <label style="font-size:0.85rem;font-weight:600;color:#555;">שם תגית הרשימה *</label>
                  <input id="email-target-list" type="text" placeholder="למשל: founders" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;font-family:inherit;">
              </div>
  
              <!-- Specific Email Input (Conditional) -->
              <div id="target-specific-group" style="display:none;flex-direction:column;gap:4px;">
                  <label style="font-size:0.85rem;font-weight:600;color:#555;">כתובת מייל לבדיקה *</label>
                  <input id="email-target-specific" type="email" placeholder="test@example.com" style="padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;font-family:inherit;">
              </div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:28px;direction:ltr;">
              <button onclick="closeEmailModal()" style="padding:10px 20px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-family:inherit;">ביטול</button>
              <button id="btn-submit-email" onclick="submitSendEmail()" style="padding:10px 20px;background:#720815;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px;font-family:inherit;">
                  <i class="fas fa-paper-plane"></i> שליחת מייל
              </button>
          </div>
      </div>
  </div>

<div id="hitech-table"></div>
{% endblock %}

{% block scripts %}
<script>
    var table = new Tabulator("#hitech-table", {
        layout: "fitColumns",
        ajaxURL: "{{ url_for('admin.get_hitech_emails') }}",
        pagination: "local",
        paginationSize: 50,
        initialSort: [{ column: "joined", dir: "desc" }],
        columns: [
            { title: "#", field: "id", width: 60, headerSort: false },
            { title: "Email", field: "email", headerFilter: "input", minWidth: 220 },
            {
                title: "Verified",
                field: "verified",
                width: 90,
                hozAlign: "center",
                headerSort: true,
                formatter: function(cell) {
                    const checked = cell.getValue() ? "checked" : "";
                    return `<input type="checkbox" ${checked} style="width:16px;height:16px;cursor:pointer;">`;
                },
                cellClick: function(e, cell) {
                    const newVal = !cell.getValue();
                    cell.setValue(newVal);
                    const id = cell.getRow().getData().id;
                    fetch("{{ url_for('admin.get_hitech_emails') }}/" + id, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ verified: newVal })
                    });
                }
            },
            {
                title: "LinkedIn",
                field: "linkedin_url",
                minWidth: 180,
                editor: "input",
                cellEdited: function(cell) {
                    const id = cell.getRow().getData().id;
                    fetch("{{ url_for('admin.get_hitech_emails') }}/" + id, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ linkedin_url: cell.getValue() })
                    });
                },
                formatter: function(cell) {
                    const url = cell.getValue();
                    if (!url) return '<span style="color:#aaa;">—</span>';
                    return `<a href="${url}" target="_blank" style="color:#5A3A31; text-decoration:underline;">${url}</a>`;
                }
            },
            {
                title: "Job Title",
                field: "job_title",
                minWidth: 180,
                headerFilter: "input",
                editor: "input",
                cellEdited: function(cell) {
                    const id = cell.getRow().getData().id;
                    fetch("{{ url_for('admin.get_hitech_emails') }}/" + id, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ job_title: cell.getValue() })
                    });
                },
                formatter: function(cell) {
                    const v = cell.getValue();
                    return v ? v : '<span style="color:#aaa;">—</span>';
                }
            },
            {
                title: "Company",
                field: "company",
                minWidth: 180,
                headerFilter: "input",
                editor: "input",
                cellEdited: function(cell) {
                    const id = cell.getRow().getData().id;
                    fetch("{{ url_for('admin.get_hitech_emails') }}/" + id, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ company: cell.getValue() })
                    });
                },
                formatter: function(cell) {
                    const v = cell.getValue();
                    return v ? v : '<span style="color:#aaa;">—</span>';
                }
            },
            {
                title: "Gender",
                field: "gender",
                width: 90,
                hozAlign: "center",
                headerSort: false,
                formatter: function(cell) {
                    const v = cell.getValue();
                    if (v === 'Female') return '<span style="background:#f8d7ea;color:#c0397a;border-radius:12px;padding:2px 10px;font-weight:700;cursor:pointer;">F</span>';
                    if (v === 'Male') return '<span style="background:#d6eaf8;color:#2980b9;border-radius:12px;padding:2px 10px;font-weight:700;cursor:pointer;">M</span>';
                    return '<span style="color:#ccc;cursor:pointer;">—</span>';
                },
                cellClick: function(e, cell) {
                    const cur = cell.getValue();
                    const next = cur === 'Female' ? 'Male' : cur === 'Male' ? '' : 'Female';
                    cell.setValue(next);
                    const id = cell.getRow().getData().id;
                    fetch("{{ url_for('admin.get_hitech_emails') }}/" + id, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ gender: next })
                    });
                }
            },
            {
                title: "List",
                field: "list_name",
                width: 160,
                headerFilter: "input",
                editor: "input",
                cellEdited: function(cell) {
                    const id = cell.getRow().getData().id;
                    fetch("{{ url_for('admin.get_hitech_emails') }}/" + id, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ list_name: cell.getValue() })
                    });
                },
                formatter: function(cell) {
                    const v = cell.getValue();
                    if (!v) return '<span style="color:#bbb; font-style:italic;">—</span>';
                    return `<span style="background:#f0ece4; color:#603e35; border-radius:4px; padding:2px 8px; font-size:0.82rem; font-weight:600;">${v}</span>`;
                }
            },
            { title: "Joined", field: "joined", width: 150 },
            {
                title: "Rejection Email",
                width: 130,
                hozAlign: "center",
                headerSort: false,
                formatter: function () {
                    return "<button title='Send rejection email' style='background:none;border:none;color:#e67e22;cursor:pointer;font-size:1rem;'><i class='fas fa-envelope-open-text'></i></button>";
                },
                cellClick: function (e, cell) {
                    const email = cell.getRow().getData().email;
                    Swal.fire({
                        title: 'Send rejection email?',
                        text: `Send LinkedIn rejection email to ${email}?`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#e67e22',
                        cancelButtonColor: '#aaa',
                        confirmButtonText: 'Send'
                    }).then(result => {
                        if (result.isConfirmed) {
                            const id = cell.getRow().getData().id;
                            fetch(`{{ url_for('admin.get_hitech_emails') }}/${id}/reject`, { method: 'POST' })
                                .then(res => res.json())
                                .then(data => {
                                    if (data.success) {
                                        Swal.fire('Sent!', `Rejection email sent to ${email}.`, 'success');
                                    } else {
                                        Swal.fire('Error', data.message || 'Failed to send email.', 'error');
                                    }
                                });
                        }
                    });
                }
            },
            {
                title: "",
                width: 60,
                hozAlign: "center",
                headerSort: false,
                formatter: function () {
                    return "<button style='background:none;border:none;color:#e74c3c;cursor:pointer;font-size:1rem;'><i class='fas fa-trash'></i></button>";
                },
                cellClick: function (e, cell) {
                    Swal.fire({
                        title: 'Remove member?',
                        text: cell.getRow().getData().email,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#e74c3c',
                        cancelButtonColor: '#aaa',
                        confirmButtonText: 'Delete'
                    }).then(result => {
                        if (result.isConfirmed) {
                            const id = cell.getRow().getData().id;
                            fetch("{{ url_for('admin.get_hitech_emails') }}/" + id, { method: 'DELETE' })
                                .then(res => {
                                    if (res.ok) {
                                        cell.getRow().delete();
                                        updateCount(table.getData());
                                    } else {
                                        Swal.fire('Error', 'Could not delete entry.', 'error');
                                    }
                                });
                        }
                    });
                }
            }
        ]
    });

    table.on("dataLoaded", function (data) {
        updateCount(data);
    });

    function updateCount(rows) {
        rows = rows || table.getData();
        const verifiedCount = rows.filter(r => r.verified).length;
        document.getElementById('email-count').textContent = '(' + rows.length + ' members)';
        document.getElementById('verified-count').textContent = '✓ ' + verifiedCount + ' verified';
    }

    function openAddModal() {
        document.getElementById('add-member-modal').style.display = 'flex';
        document.getElementById('add-email').focus();
    }

    function closeAddModal() {
        document.getElementById('add-member-modal').style.display = 'none';
        ['add-email','add-linkedin','add-job-title','add-company','add-list'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('add-gender').value = '';
        document.getElementById('add-verified').checked = false;
    }

    function submitAddMember() {
        const email = document.getElementById('add-email').value.trim();
        if (!email) { alert('Email is required.'); return; }
        fetch("{{ url_for('admin.get_hitech_emails') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: email,
                linkedin_url: document.getElementById('add-linkedin').value.trim(),
                job_title: document.getElementById('add-job-title').value.trim(),
                company: document.getElementById('add-company').value.trim(),
                gender: document.getElementById('add-gender').value,
                list_name: document.getElementById('add-list').value.trim(),
                verified: document.getElementById('add-verified').checked,
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.id) {
                table.addRow(data, true);
                updateCount(table.getData());
                closeAddModal();
            } else {
                alert(data.message || 'Failed to add member.');
            }
        });
    }

    function exportCSV() {
        const verifiedRows = table.getData().filter(r => r.verified);
        const fields = ['id', 'email', 'linkedin_url', 'job_title', 'company', 'gender', 'list_name', 'joined'];
        const header = fields.join(',');
        const rows = verifiedRows.map(r =>
            fields.map(f => {
                const val = (r[f] ?? '').toString().replace(/"/g, '""');
                return `"${val}"`;
            }).join(',')
        );
        const csv = [header, ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'tech_community_verified.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    function openEmailModal() {
        document.getElementById('send-email-modal').style.display = 'flex';
        document.getElementById('email-subject').focus();
    }

    function closeEmailModal() {
        document.getElementById('send-email-modal').style.display = 'none';
        document.getElementById('email-subject').value = '';
        document.getElementById('email-body').value = '';
        document.getElementById('email-button-url').value = '';
        document.getElementById('email-button-text').value = '';
        document.getElementById('email-image-url').value = '';
        document.getElementById('email-target-list').value = '';
        document.getElementById('email-target-specific').value = '';
        
        document.querySelector('input[name="email-target"][value="all"]').checked = true;
        toggleTargetFields();
    }

    function toggleTargetFields() {
        const selectedTarget = document.querySelector('input[name="email-target"]:checked').value;
        document.getElementById('target-list-group').style.display = selectedTarget === 'list' ? 'flex' : 'none';
        document.getElementById('target-specific-group').style.display = selectedTarget === 'specific' ? 'flex' : 'none';
    }

    function submitSendEmail() {
        const subject = document.getElementById('email-subject').value.trim();
        const body = document.getElementById('email-body').value.trim();
        const buttonUrl = document.getElementById('email-button-url').value.trim();
        const buttonText = document.getElementById('email-button-text').value.trim();
        const imageUrl = document.getElementById('email-image-url').value.trim();
        const target = document.querySelector('input[name="email-target"]:checked').value;
        const listName = document.getElementById('email-target-list').value.trim();
        const specificEmail = document.getElementById('email-target-specific').value.trim();

        if (!subject || !body) {
            Swal.fire('שגיאה', 'נושא המייל ותוכן המייל הינם שדות חובה.', 'error');
            return;
        }

        if (target === 'list' && !listName) {
            Swal.fire('שגיאה', 'יש להזין שם תגית רשימה.', 'error');
            return;
        }

        if (target === 'specific' && !specificEmail) {
            Swal.fire('שגיאה', 'יש להזין כתובת מייל תקינה לבדיקה.', 'error');
            return;
        }

        const btn = document.getElementById('btn-submit-email');
        const originalHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> שולח מיילים...';

        fetch('/admin/api/hitech-emails/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                subject: subject,
                body: body,
                button_url: buttonUrl,
                button_text: buttonText,
                image_url: imageUrl,
                target: target,
                list_name: listName,
                specific_email: specificEmail
            })
        })
        .then(res => res.json())
        .then(data => {
            btn.disabled = false;
            btn.innerHTML = originalHTML;

            if (data.success) {
                Swal.fire('הצלחה!', `נשלחו בהצלחה ${data.sent_count} מיילים.`, 'success');
                closeEmailModal();
            } else {
                Swal.fire('שגיאה', data.message || 'שליחת המיילים נכשלה.', 'error');
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerHTML = originalHTML;
            Swal.fire('שגיאה', 'אירעה שגיאה בחיבור לשרת.', 'error');
        });
    }
</script>
{% endblock %}
