{% extends "admin/base.html" %}
{% block title %}Portfolio Content Editor{% endblock %}

{% block extra_css %}
<style>
  .content-editor { max-width: 900px; margin-bottom: 40px; }
  .section-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--sidebar-bg);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 28px 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent-color);
  }
  .editor-field { margin-bottom: 18px; }
  .editor-field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }
  .editor-field textarea, .editor-field input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    transition: .2s;
    resize: vertical;
  }
  .editor-field textarea:focus, .editor-field input[type="text"]:focus {
    border-color: var(--accent-color);
    outline: none;
    box-shadow: 0 0 0 2px rgba(211,167,138,.2);
  }
  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--primary-bg);
    padding: 14px 0 14px;
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
    border-top: 1px solid #eee;
  }
  .save-msg { font-size: 14px; color: var(--success-color); font-weight: 600; display: none; }
  .sub-card {
    background: #fdfcf7;
    border: 1px dashed rgba(90, 58, 49, 0.3);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .btn-small {
    padding: 6px 12px;
    font-size: 12px;
    margin-top: 8px;
  }
  .array-items { margin-bottom: 16px; }
  .item-controls {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
</style>
{% endblock %}

{% block content %}
<div class="header-controls">
  <h2><i class="fas fa-edit"></i> Portfolio Content Editor</h2>
</div>

<div class="content-editor" id="content-editor">
  <div style="color:#999;padding:40px 0;text-align:center"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
</div>

<div class="save-bar">
  <button class="btn btn-success" onclick="saveContent()"><i class="fas fa-save"></i> Save Changes</button>
  <span class="save-msg" id="save-msg">Saved!</span>
</div>
{% endblock %}

{% block scripts %}
<script>
var portfolioContent = {};

function loadContent() {
  fetch('/admin/api/portfolio/content')
    .then(r => r.json())
    .then(data => {
      portfolioContent = data;
      renderEditor();
    })
    .catch(() => {
      document.getElementById('content-editor').innerHTML = '<p style="color:red">Failed to load content data.</p>';
    });
}

function renderEditor() {
  const c = portfolioContent.portfolio || {};
  let html = '';

  // Meta
  html += `
    <div class="section-title">Meta</div>
    <div class="editor-field">
      <label>Page Title</label>
      <input type="text" id="meta-title" value="${escapeHtml(c.meta?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Page Description</label>
      <textarea id="meta-description">${escapeHtml(c.meta?.description || '')}</textarea>
    </div>
    <div class="editor-field">
      <label>Canonical URL</label>
      <input type="text" id="meta-canonical" value="${escapeHtml(c.meta?.canonical || '')}">
    </div>
  `;

  // Hero
  html += `
    <div class="section-title">Hero Section</div>
    <div class="editor-field">
      <label>Main Headline</label>
      <input type="text" id="hero-headline" value="${escapeHtml(c.hero?.headline || '')}">
    </div>
    <div class="editor-field">
      <label>Headline Emphasis (em tag)</label>
      <input type="text" id="hero-emphasis" value="${escapeHtml(c.hero?.headlineEmphasis || '')}">
    </div>
    <div class="editor-field">
      <label>Subheadline</label>
      <textarea id="hero-subheadline">${escapeHtml(c.hero?.subheadline || '')}</textarea>
    </div>
    <div class="editor-field">
      <label>CTA Button Text</label>
      <input type="text" id="hero-cta" value="${escapeHtml(c.hero?.cta || '')}">
    </div>
  `;

  // Problem
  html += `
    <div class="section-title">Problem Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="problem-title" value="${escapeHtml(c.problem?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Body Text</label>
      <textarea id="problem-body">${escapeHtml(c.problem?.body || '')}</textarea>
    </div>
    <div class="editor-field">
      <label>"Good News" Label</label>
      <input type="text" id="problem-goodnews" value="${escapeHtml(c.problem?.goodNews || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Good News Cards (card 2 is the highlighted one)</div>
  `;

  // Render the good-news cards (fixed set of 3)
  (c.problem?.cards || []).forEach((card, i) => {
    html += `
      <div class="sub-card">
        <div class="editor-field">
          <label>Card ${i + 1} Icon (Material Symbols name)</label>
          <input type="text" id="problem-card-icon-${i}" value="${escapeHtml(card.icon || '')}">
        </div>
        <div class="editor-field">
          <label>Card ${i + 1} Title</label>
          <input type="text" id="problem-card-title-${i}" value="${escapeHtml(card.title || '')}">
        </div>
        <div class="editor-field">
          <label>Card ${i + 1} Body</label>
          <textarea id="problem-card-body-${i}">${escapeHtml(card.body || '')}</textarea>
        </div>
      </div>
    `;
  });

  // Content Series (work page videos)
  html += `
    <div class="section-title">Content Series (Work page videos)</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="series-title" value="${escapeHtml(c.series?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Subtitle</label>
      <textarea id="series-subtitle">${escapeHtml(c.series?.subtitle || '')}</textarea>
    </div>
    <button class="btn btn-small" onclick="addSeriesItem()">+ Add Video</button>
  `;
  (c.series?.items || []).forEach((item, i) => {
    html += `
      <div class="sub-card">
        <div class="editor-field">
          <label>YouTube Video ID (the part after /shorts/ or v=)</label>
          <input type="text" id="series-video-${i}" value="${escapeHtml(item.videoId || '')}">
        </div>
        <div class="editor-field">
          <label>Series Name (badge — the content type)</label>
          <input type="text" id="series-series-${i}" value="${escapeHtml(item.series || '')}">
        </div>
        <div class="editor-field">
          <label>Title (company / subject)</label>
          <input type="text" id="series-item-title-${i}" value="${escapeHtml(item.title || '')}">
        </div>
        <div class="editor-field">
          <label>Description</label>
          <input type="text" id="series-desc-${i}" value="${escapeHtml(item.description || '')}">
        </div>
        <div class="item-controls">
          <button class="btn btn-small" onclick="removeSeriesItem(${i})">Remove</button>
        </div>
      </div>
    `;
  });

  // Difference
  html += `
    <div class="section-title">Difference Section</div>
    <div class="editor-field">
      <label>Title Part 1</label>
      <input type="text" id="diff-title" value="${escapeHtml(c.difference?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Title Part 2 (emphasis)</label>
      <input type="text" id="diff-emphasis" value="${escapeHtml(c.difference?.titleEmphasis || '')}">
    </div>
    <div class="editor-field">
      <label>Body Text</label>
      <textarea id="diff-body">${escapeHtml(c.difference?.body || '')}</textarea>
    </div>
    <div class="editor-field">
      <label>Highlight Text</label>
      <input type="text" id="diff-highlight" value="${escapeHtml(c.difference?.highlight || '')}">
    </div>
  `;

  // Services
  html += `
    <div class="section-title">Services Section</div>
    <div class="editor-field">
      <label>Section Title</label>
      <input type="text" id="services-title" value="${escapeHtml(c.services?.title || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Services List</div>
  `;

  if (c.services?.items) {
    c.services.items.forEach((svc, i) => {
      html += `
        <div class="sub-card">
          <div class="editor-field">
            <label>Service Name</label>
            <input type="text" id="service-name-${i}" value="${escapeHtml(svc.name || '')}">
          </div>
          <div class="editor-field">
            <label>Description</label>
            <textarea id="service-desc-${i}">${escapeHtml(svc.description || '')}</textarea>
          </div>
          <div><strong>Examples:</strong></div>
          <div id="service-examples-${i}" class="array-items"></div>
          <button class="btn btn-small" onclick="addServiceExample(${i})">+ Add Example</button>
          <div class="item-controls">
            <button class="btn btn-small" onclick="removeService(${i})">Remove Service</button>
          </div>
        </div>
      `;
      if (svc.examples) {
        svc.examples.forEach((ex, j) => {
          html += `
            <div class="sub-card" style="margin-left: 16px;">
              <input type="text" id="service-example-${i}-${j}" value="${escapeHtml(ex)}">
              <button class="btn btn-small" onclick="removeServiceExample(${i}, ${j})">Remove</button>
            </div>
          `;
        });
      }
    });
  }
  html += `<button class="btn btn-small" onclick="addService()">+ Add Service</button>`;

  // Why Me
  html += `
    <div class="section-title">Why Me Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="whyme-title" value="${escapeHtml(c.whyme?.title || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Cards</div>
  `;

  if (c.whyme?.cards) {
    c.whyme.cards.forEach((card, i) => {
      html += `
        <div class="sub-card">
          <div class="editor-field">
            <label>Card Title</label>
            <input type="text" id="whyme-card-title-${i}" value="${escapeHtml(card.title || '')}">
          </div>
          <div class="editor-field">
            <label>Card Body</label>
            <textarea id="whyme-card-body-${i}">${escapeHtml(card.body || '')}</textarea>
          </div>
          <div class="item-controls">
            <button class="btn btn-small" onclick="removeWhyMeCard(${i})">Remove Card</button>
          </div>
        </div>
      `;
    });
  }
  html += `<button class="btn btn-small" onclick="addWhyMeCard()">+ Add Card</button>`;

  // Workflow
  html += `
    <div class="section-title">Workflow Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="workflow-title" value="${escapeHtml(c.workflow?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Subtitle</label>
      <input type="text" id="workflow-subtitle" value="${escapeHtml(c.workflow?.subtitle || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Workflow Steps</div>
  `;

  if (c.workflow?.steps) {
    c.workflow.steps.forEach((step, i) => {
      html += `
        <div class="sub-card">
          <div class="editor-field">
            <label>Step Title</label>
            <input type="text" id="workflow-title-${i}" value="${escapeHtml(step.title || '')}">
          </div>
          <div class="editor-field">
            <label>Step Description</label>
            <textarea id="workflow-desc-${i}">${escapeHtml(step.description || '')}</textarea>
          </div>
          <div class="item-controls">
            <button class="btn btn-small" onclick="removeWorkflowStep(${i})">Remove</button>
          </div>
        </div>
      `;
    });
  }
  html += `<button class="btn btn-small" onclick="addWorkflowStep()">+ Add Workflow Step</button>`;

  // Process
  html += `
    <div class="section-title">Process Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="process-title" value="${escapeHtml(c.process?.title || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Steps</div>
  `;

  if (c.process?.steps) {
    c.process.steps.forEach((step, i) => {
      html += `
        <div class="sub-card">
          <div class="editor-field">
            <label>Step Number</label>
            <input type="text" id="process-number-${i}" value="${step.number || ''}">
          </div>
          <div class="editor-field">
            <label>Step Title</label>
            <input type="text" id="process-title-${i}" value="${escapeHtml(step.title || '')}">
          </div>
          <div class="editor-field">
            <label>Step Description</label>
            <textarea id="process-desc-${i}">${escapeHtml(step.description || '')}</textarea>
          </div>
          <div class="item-controls">
            <button class="btn btn-small" onclick="removeProcessStep(${i})">Remove Step</button>
          </div>
        </div>
      `;
    });
  }
  html += `<button class="btn btn-small" onclick="addProcessStep()">+ Add Step</button>`;

  // Packages
  html += `
    <div class="section-title">Packages Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="packages-title" value="${escapeHtml(c.packages?.title || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Packages</div>
  `;

  if (c.packages?.items) {
    c.packages.items.forEach((pkg, i) => {
      html += `
        <div class="sub-card">
          <div class="editor-field">
            <label>Package Name</label>
            <input type="text" id="package-name-${i}" value="${escapeHtml(pkg.name || '')}">
          </div>
          <div class="editor-field">
            <label>Subtitle</label>
            <input type="text" id="package-subtitle-${i}" value="${escapeHtml(pkg.subtitle || '')}">
          </div>
          <div class="editor-field">
            <label>Description</label>
            <textarea id="package-desc-${i}">${escapeHtml(pkg.description || '')}</textarea>
          </div>
          <div class="editor-field">
            <label>Minimum Commitment</label>
            <input type="text" id="package-commitment-${i}" value="${escapeHtml(pkg.minimumCommitment || '')}">
          </div>
          <div><strong>Includes:</strong></div>
          <div id="package-items-${i}"></div>
          <button class="btn btn-small" onclick="addPackageItem(${i})">+ Add Item</button>
          <div class="editor-field">
            <label>Goal</label>
            <textarea id="package-goal-${i}">${escapeHtml(pkg.goal || '')}</textarea>
          </div>
          <div class="item-controls">
            <button class="btn btn-small" onclick="removePackage(${i})">Remove Package</button>
          </div>
        </div>
      `;
      if (pkg.includes) {
        pkg.includes.forEach((item, j) => {
          html += `
            <div class="sub-card" style="margin-left: 16px;">
              <input type="text" id="package-item-${i}-${j}" value="${escapeHtml(item)}">
              <button class="btn btn-small" onclick="removePackageItem(${i}, ${j})">Remove</button>
            </div>
          `;
        });
      }
    });
  }
  html += `<button class="btn btn-small" onclick="addPackage()">+ Add Package</button>`;

  // Social Feed
  html += `
    <div class="section-title">Social Feed Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="feed-title" value="${escapeHtml(c.sociofeed?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Description</label>
      <input type="text" id="feed-desc" value="${escapeHtml(c.sociofeed?.description || '')}">
    </div>
  `;

  // Final CTA
  html += `
    <div class="section-title">Final CTA Section</div>
    <div class="editor-field">
      <label>Headline</label>
      <input type="text" id="finalcta-headline" value="${escapeHtml(c.finalcta?.headline || '')}">
    </div>
    <div class="editor-field">
      <label>Subheadline</label>
      <input type="text" id="finalcta-subheadline" value="${escapeHtml(c.finalcta?.subheadline || '')}">
    </div>
    <div class="editor-field">
      <label>CTA Button Text</label>
      <input type="text" id="finalcta-cta" value="${escapeHtml(c.finalcta?.cta || '')}">
    </div>
  `;

  // Content Types
  html += `
    <div class="section-title">Content Types Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="contenttypes-title" value="${escapeHtml(c.contentTypes?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Subtitle</label>
      <input type="text" id="contenttypes-subtitle" value="${escapeHtml(c.contentTypes?.subtitle || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Content Types</div>
  `;

  if (c.contentTypes?.items) {
    c.contentTypes.items.forEach((item, i) => {
      html += `
        <div class="sub-card">
          <div class="editor-field">
            <label>Content Type Name</label>
            <input type="text" id="contenttype-name-${i}" value="${escapeHtml(item.name || '')}">
          </div>
          <div class="editor-field">
            <label>Icon/Emoji</label>
            <input type="text" id="contenttype-icon-${i}" value="${escapeHtml(item.icon || '')}">
          </div>
          <div class="editor-field">
            <label>Description</label>
            <textarea id="contenttype-desc-${i}">${escapeHtml(item.description || '')}</textarea>
          </div>
          <div class="item-controls">
            <button class="btn btn-small" onclick="removeContentType(${i})">Remove</button>
          </div>
        </div>
      `;
    });
  }
  html += `<button class="btn btn-small" onclick="addContentType()">+ Add Content Type</button>`;

  // Companies
  html += `
    <div class="section-title">Companies Section</div>
    <div class="editor-field">
      <label>Title</label>
      <input type="text" id="companies-title" value="${escapeHtml(c.companies?.title || '')}">
    </div>
    <div class="editor-field">
      <label>Subtitle</label>
      <input type="text" id="companies-subtitle" value="${escapeHtml(c.companies?.subtitle || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Companies</div>
  `;

  if (c.companies?.items) {
    c.companies.items.forEach((company, i) => {
      html += `
        <div class="sub-card">
          <div class="editor-field">
            <label>Company Name</label>
            <input type="text" id="company-name-${i}" value="${escapeHtml(company.name || '')}">
          </div>
          <div class="editor-field">
            <label>Logo Identifier (for future image upload)</label>
            <input type="text" id="company-logo-${i}" value="${escapeHtml(company.logo || '')}">
          </div>
          <div class="item-controls">
            <button class="btn btn-small" onclick="removeCompany(${i})">Remove</button>
          </div>
        </div>
      `;
    });
  }
  html += `<button class="btn btn-small" onclick="addCompany()">+ Add Company</button>`;

  // Credibility
  html += `
    <div class="section-title">Credibility</div>
    <div class="editor-field">
      <label>Highlight Text</label>
      <input type="text" id="credibility-highlight" value="${escapeHtml(c.credibility?.highlight || '')}">
    </div>
  `;

  // Field Quote (testimonial band after The Problem)
  html += `
    <div class="section-title">Field Quote</div>
    <div class="editor-field">
      <label>Sticker Label</label>
      <input type="text" id="quote-label" value="${escapeHtml(c.quote?.label || '')}">
    </div>
    <div class="editor-field">
      <label>Quote Text</label>
      <textarea id="quote-text">${escapeHtml(c.quote?.text || '')}</textarea>
    </div>
    <div class="editor-field">
      <label>Attribution</label>
      <input type="text" id="quote-attribution" value="${escapeHtml(c.quote?.attribution || '')}">
    </div>
  `;

  // Access Gate (the locked screen on /portfolio)
  html += `
    <div class="section-title">Access Gate (locked screen)</div>
    <div class="editor-field">
      <label>Browser Tab Title</label>
      <input type="text" id="gate-meta-title" value="${escapeHtml(c.gate?.meta_title || '')}">
    </div>
    <div class="editor-field">
      <label>Meta Description</label>
      <input type="text" id="gate-meta-description" value="${escapeHtml(c.gate?.meta_description || '')}">
    </div>
    <div class="section-title" style="margin-top: 16px;">Terminal Boot Lines</div>
  `;
  if (c.gate?.boot_lines) {
    c.gate.boot_lines.forEach((line, i) => {
      html += `
        <div class="sub-card">
          <input type="text" id="gate-line-${i}" value="${escapeHtml(line)}" placeholder="Boot line text">
          <div class="item-controls">
            <button class="btn btn-small" onclick="removeGateLine(${i})">Remove</button>
          </div>
        </div>
      `;
    });
  }
  html += `
    <button class="btn btn-small" onclick="addGateLine()">+ Add Boot Line</button>
    <div class="editor-field" style="margin-top: 16px;">
      <label>Prompt Label</label>
      <input type="text" id="gate-prompt" value="${escapeHtml(c.gate?.prompt || '')}">
    </div>
    <div class="editor-field">
      <label>Input Placeholder</label>
      <input type="text" id="gate-placeholder" value="${escapeHtml(c.gate?.placeholder || '')}">
    </div>
    <div class="editor-field">
      <label>Button Text</label>
      <input type="text" id="gate-button" value="${escapeHtml(c.gate?.button || '')}">
    </div>
    <div class="editor-field">
      <label>Hint (below button)</label>
      <input type="text" id="gate-hint" value="${escapeHtml(c.gate?.hint || '')}">
    </div>
    <div class="editor-field">
      <label>Wrong Code — Title</label>
      <input type="text" id="gate-denied-title" value="${escapeHtml(c.gate?.denied_title || '')}">
    </div>
    <div class="editor-field">
      <label>Wrong Code — Hint</label>
      <input type="text" id="gate-denied-hint" value="${escapeHtml(c.gate?.denied_hint || '')}">
    </div>
    <div class="editor-field">
      <label>Expired — Title</label>
      <input type="text" id="gate-expired-title" value="${escapeHtml(c.gate?.expired_title || '')}">
    </div>
    <div class="editor-field">
      <label>Expired — Body</label>
      <textarea id="gate-expired-body">${escapeHtml(c.gate?.expired_body || '')}</textarea>
    </div>
    <div class="editor-field">
      <label>Expired — CTA Button Text</label>
      <input type="text" id="gate-expired-cta" value="${escapeHtml(c.gate?.expired_cta || '')}">
    </div>
    <div class="editor-field">
      <label>Expired — Contact Email (CTA target)</label>
      <input type="text" id="gate-expired-email" value="${escapeHtml(c.gate?.expired_email || '')}">
    </div>
    <div class="editor-field">
      <label>Granted — Title</label>
      <input type="text" id="gate-granted-title" value="${escapeHtml(c.gate?.granted_title || '')}">
    </div>
    <div class="editor-field">
      <label>Granted — Loading Line</label>
      <input type="text" id="gate-granted-line" value="${escapeHtml(c.gate?.granted_line || '')}">
    </div>
  `;

  document.getElementById('content-editor').innerHTML = html;
}

function escapeHtml(text) {
  const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
  return (text || '').replace(/[&<>"']/g, m => map[m]);
}

function collectData() {
  const c = portfolioContent.portfolio || {};

  // Meta
  c.meta = {
    title: document.getElementById('meta-title').value,
    description: document.getElementById('meta-description').value,
    canonical: document.getElementById('meta-canonical').value,
  };

  // Hero
  c.hero = {
    headline: document.getElementById('hero-headline').value,
    headlineEmphasis: document.getElementById('hero-emphasis').value,
    subheadline: document.getElementById('hero-subheadline').value,
    cta: document.getElementById('hero-cta').value,
  };

  // Problem
  c.problem = {
    title: document.getElementById('problem-title').value,
    body: document.getElementById('problem-body').value,
    goodNews: document.getElementById('problem-goodnews').value,
    cards: [],
  };
  let i = 0;
  while (document.getElementById(`problem-card-title-${i}`)) {
    c.problem.cards.push({
      icon: document.getElementById(`problem-card-icon-${i}`).value,
      title: document.getElementById(`problem-card-title-${i}`).value,
      body: document.getElementById(`problem-card-body-${i}`).value,
    });
    i++;
  }

  // Content Series (work page videos)
  c.series = {
    title: document.getElementById('series-title').value,
    subtitle: document.getElementById('series-subtitle').value,
    items: [],
  };
  i = 0;
  while (document.getElementById(`series-video-${i}`)) {
    c.series.items.push({
      videoId: document.getElementById(`series-video-${i}`).value.trim(),
      series: document.getElementById(`series-series-${i}`).value,
      title: document.getElementById(`series-item-title-${i}`).value,
      description: document.getElementById(`series-desc-${i}`).value,
    });
    i++;
  }

  // Difference
  c.difference = {
    title: document.getElementById('diff-title').value,
    titleEmphasis: document.getElementById('diff-emphasis').value,
    body: document.getElementById('diff-body').value,
    highlight: document.getElementById('diff-highlight').value,
  };

  // Services
  c.services = {
    title: document.getElementById('services-title').value,
    items: [],
  };
  i = 0;
  while (document.getElementById(`service-name-${i}`)) {
    const svc = {
      name: document.getElementById(`service-name-${i}`).value,
      description: document.getElementById(`service-desc-${i}`).value,
      examples: [],
    };
    let j = 0;
    while (document.getElementById(`service-example-${i}-${j}`)) {
      svc.examples.push(document.getElementById(`service-example-${i}-${j}`).value);
      j++;
    }
    c.services.items.push(svc);
    i++;
  }

  // Why Me
  c.whyme = {
    title: document.getElementById('whyme-title').value,
    cards: [],
  };
  i = 0;
  while (document.getElementById(`whyme-card-title-${i}`)) {
    c.whyme.cards.push({
      title: document.getElementById(`whyme-card-title-${i}`).value,
      body: document.getElementById(`whyme-card-body-${i}`).value,
    });
    i++;
  }

  // Workflow
  c.workflow = {
    title: document.getElementById('workflow-title').value,
    subtitle: document.getElementById('workflow-subtitle').value,
    steps: [],
  };
  i = 0;
  while (document.getElementById(`workflow-title-${i}`)) {
    c.workflow.steps.push({
      title: document.getElementById(`workflow-title-${i}`).value,
      description: document.getElementById(`workflow-desc-${i}`).value,
    });
    i++;
  }

  // Process
  c.process = {
    title: document.getElementById('process-title').value,
    steps: [],
  };
  i = 0;
  while (document.getElementById(`process-number-${i}`)) {
    c.process.steps.push({
      number: parseInt(document.getElementById(`process-number-${i}`).value),
      title: document.getElementById(`process-title-${i}`).value,
      description: document.getElementById(`process-desc-${i}`).value,
    });
    i++;
  }

  // Packages
  c.packages = {
    title: document.getElementById('packages-title').value,
    items: [],
  };
  i = 0;
  while (document.getElementById(`package-name-${i}`)) {
    const pkg = {
      name: document.getElementById(`package-name-${i}`).value,
      subtitle: document.getElementById(`package-subtitle-${i}`).value,
      description: document.getElementById(`package-desc-${i}`).value,
      minimumCommitment: document.getElementById(`package-commitment-${i}`).value || undefined,
      includes: [],
      goal: document.getElementById(`package-goal-${i}`).value,
    };
    let j = 0;
    while (document.getElementById(`package-item-${i}-${j}`)) {
      pkg.includes.push(document.getElementById(`package-item-${i}-${j}`).value);
      j++;
    }
    c.packages.items.push(pkg);
    i++;
  }

  // Social Feed
  c.sociofeed = {
    title: document.getElementById('feed-title').value,
    description: document.getElementById('feed-desc').value,
  };

  // Final CTA
  c.finalcta = {
    headline: document.getElementById('finalcta-headline').value,
    subheadline: document.getElementById('finalcta-subheadline').value,
    cta: document.getElementById('finalcta-cta').value,
  };

  // Content Types
  c.contentTypes = {
    title: document.getElementById('contenttypes-title').value,
    subtitle: document.getElementById('contenttypes-subtitle').value,
    items: [],
  };
  i = 0;
  while (document.getElementById(`contenttype-name-${i}`)) {
    c.contentTypes.items.push({
      name: document.getElementById(`contenttype-name-${i}`).value,
      icon: document.getElementById(`contenttype-icon-${i}`).value,
      description: document.getElementById(`contenttype-desc-${i}`).value,
    });
    i++;
  }

  // Companies
  c.companies = {
    title: document.getElementById('companies-title').value,
    subtitle: document.getElementById('companies-subtitle').value,
    items: [],
  };
  i = 0;
  while (document.getElementById(`company-name-${i}`)) {
    c.companies.items.push({
      name: document.getElementById(`company-name-${i}`).value,
      logo: document.getElementById(`company-logo-${i}`).value,
    });
    i++;
  }

  // Credibility
  c.credibility = {
    highlight: document.getElementById('credibility-highlight').value,
  };

  // Field Quote
  c.quote = {
    label: document.getElementById('quote-label').value,
    text: document.getElementById('quote-text').value,
    attribution: document.getElementById('quote-attribution').value,
  };

  // Access Gate
  c.gate = {
    meta_title: document.getElementById('gate-meta-title').value,
    meta_description: document.getElementById('gate-meta-description').value,
    boot_lines: [],
    prompt: document.getElementById('gate-prompt').value,
    placeholder: document.getElementById('gate-placeholder').value,
    button: document.getElementById('gate-button').value,
    hint: document.getElementById('gate-hint').value,
    denied_title: document.getElementById('gate-denied-title').value,
    denied_hint: document.getElementById('gate-denied-hint').value,
    expired_title: document.getElementById('gate-expired-title').value,
    expired_body: document.getElementById('gate-expired-body').value,
    expired_cta: document.getElementById('gate-expired-cta').value,
    expired_email: document.getElementById('gate-expired-email').value,
    granted_title: document.getElementById('gate-granted-title').value,
    granted_line: document.getElementById('gate-granted-line').value,
  };
  i = 0;
  while (document.getElementById(`gate-line-${i}`)) {
    c.gate.boot_lines.push(document.getElementById(`gate-line-${i}`).value);
    i++;
  }

  portfolioContent.portfolio = c;
  return portfolioContent;
}

function saveContent() {
  const data = collectData();
  fetch('/admin/api/portfolio/content', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  })
    .then(r => r.json())
    .then(() => {
      document.getElementById('save-msg').style.display = 'inline';
      setTimeout(() => {
        document.getElementById('save-msg').style.display = 'none';
      }, 3000);
    })
    .catch(e => alert(`Error: ${e}`));
}
