{% extends "admin/base.html" %}

{% block title %}Members{% endblock %}

{% block content %}
<div class="header-controls">
    <h2>Members</h2>
</div>

<div id="members-table"></div>

{% endblock %}

{% block scripts %}
<script>
    var table = new Tabulator("#members-table", {
        layout: "fitColumns",
        ajaxURL: "{{ url_for('admin.get_users') }}",
        pagination: "local",
        paginationSize: 50,
        initialSort: [{ column: "created_at", dir: "desc" }],
        columns: [
            { title: "ID", field: "id", width: 60, headerSort: false, cssClass: "readonly" },
            { title: "Email", field: "email", headerFilter: "input", minWidth: 200 },
            { title: "Name", field: "name", editor: "input", headerFilter: "input", width: 150 },
            { title: "Sign-up", field: "method", headerFilter: "input", width: 130 },
            { title: "Paid", field: "is_paid", editor: "tickCross", formatter: "tickCross", hozAlign: "center", headerFilter: "tickCross", width: 80 },
            { title: "Items", field: "items", editor: "input", headerFilter: "input", width: 140, tooltip: "Purchased Grow items, comma-separated slugs (e.g. japan)" },
            { title: "Paid until", field: "paid_until", editor: "input", headerFilter: "input", width: 130, tooltip: "YYYY-MM-DD, or blank for none" },
            { title: "PayPlus sub", field: "payplus_sub_uid", headerFilter: "input", width: 180 },
            { title: "Joined", field: "created_at", headerFilter: "input", width: 110 },
        ]
    });

    // Persist inline edits (Name, Paid, Paid until)
    table.on("cellEdited", function (cell) {
        var data = cell.getRow().getData();
        fetch("{{ url_for('admin.get_users') }}/" + data.id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(res => {
            if (!res.ok) {
                res.json().then(j => Swal.fire('Error', (j && j.error) || 'Failed to save.', 'error'))
                          .catch(() => Swal.fire('Error', 'Failed to save.', 'error'));
                cell.restoreOldValue();
            }
        }).catch(() => {
            Swal.fire('Error', 'Failed to save.', 'error');
            cell.restoreOldValue();
        });
    });
</script>
{% endblock %}
