{% extends "admin/base.html" %}
{% block title %}Blog Content{% endblock %}

{% block extra_css %}
<style>
  .blog-editor { max-width: 860px; transition: max-width 0.2s ease; }
  .blog-editor.wide { max-width: 100%; }
  .blog-section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--sidebar-bg);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 28px 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent-color);
  }
  .blog-field { margin-bottom: 18px; }
  .blog-field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }
  .blog-field textarea, .blog-field input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    transition: .2s;
    resize: vertical;
  }
  .blog-field textarea:focus, .blog-field input[type="text"]:focus {
    border-color: var(--accent-color);
    outline: none;
    box-shadow: 0 0 0 2px rgba(211,167,138,.2);
  }
  .city-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 700px) { .city-grid { grid-template-columns: 1fr; } }
  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--primary-bg);
    padding: 14px 0 4px;
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
  }
  .save-msg { font-size: 14px; color: var(--success-color); font-weight: 600; display: none; }
  
  /* Subtabs for Bachelorette editor */
  .admin-subtabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 20px 0;
    border-bottom: 2px solid #eee;
    padding-bottom: 12px;
    align-items: center;
  }
  .admin-subtab-btn {
    padding: 8px 16px;
    border: none;
    background: #f1f3f5;
    color: #495057;
    font-weight: 600;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .admin-subtab-btn:hover {
    background: #e9ecef;
  }
  .admin-subtab-btn.active {
    background: var(--sidebar-bg);
    color: white;
  }
  .admin-tab-content {
    display: none;
    animation: fadeIn 0.2s ease-in-out;
  }
  .admin-tab-content.active {
    display: block;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Party Games tables: click row to edit, drag handle to reorder */
  #bachelorette-games-elegant-table .tabulator-row,
  #bachelorette-games-rowdy-table .tabulator-row {
    cursor: pointer;
  }
  .drag-handle-cell {
    cursor: grab;
    color: #aaa;
  }
  .game-list-block {
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 12px 34px 12px 12px;
    margin-bottom: 10px;
    position: relative;
    background: #fafafa;
  }
  .game-list-remove-btn {
    position: absolute;
    top: 8px;
    left: 8px;
    background: none;
    border: none;
    color: #e74c3c;
    cursor: pointer;
    font-size: 15px;
  }
  .game-list-remove-btn:hover { color: #c0392b; }
  .games-hint {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
  }

  /* Make textarea cell editors (e.g. venues Description) big enough to actually read while typing */
  .tabulator-cell.tabulator-editing textarea {
    min-height: 100px !important;
    min-width: 320px !important;
    font-size: 14px !important;
    line-height: 1.5 !important;
    padding: 8px !important;
    resize: vertical !important;
    z-index: 20;
  }
</style>
{% endblock %}

{% block content %}
<div class="header-controls">
  <h2><i class="fas fa-book-open"></i> Blog Content</h2>
  <div style="display:flex;gap:8px;align-items:center">
    <select id="blog-slug" class="form-control" style="width:auto">
      <option value="japan">Japan Guide</option>
      <option value="bachelorette">Bachelorette Directory</option>
    </select>
  </div>
</div>

<div class="blog-editor" id="blog-editor">
  <div style="color:#999;padding:40px 0;text-align:center"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
</div>

<div class="save-bar" id="save-bar-bottom">
  <button class="btn btn-success" onclick="saveBlog()"><i class="fas fa-save"></i> Save Changes</button>
  <span class="save-msg" id="save-msg-bottom">Saved!</span>
</div>
{% endblock %}

{% block scripts %}
<script>
var currentSlug = '';
var blogData = {};

// Bachelorette Tabulator variables
var bacheloretteTable = null;
var bacheloretteSuppliersTable = null;
var bacheloretteGamesElegantTable = null;
var bacheloretteGamesRowdyTable = null;
var bacheloretteDesignsSetsTable = null;
var bacheloretteAETable = null;
var bachelorettePSTable = null;
var bacheloretteGiftsTable = null;

function field(key, label, rows) {
  rows = rows || 3;
  var val = (blogData[key] || '').replace(/</g, '&lt;');
  return '<div class="blog-field"><label>' + label + '</label>' +
    '<textarea rows="' + rows + '" data-key="' + key + '">' + val + '</textarea></div>';
}

function cityField(cityKey, subKey, label, rows) {
  rows = rows || 3;
  var val = ((blogData.cities || {})[cityKey] || {})[subKey] || '';
  val = val.replace(/</g, '&lt;');
  return '<div class="blog-field"><label>' + label + '</label>' +
    '<textarea rows="' + rows + '" data-city="' + cityKey + '" data-sub="' + subKey + '">' + val + '</textarea></div>';
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function truncateFormatter(maxLen) {
  return function(cell) {
    var v = String(cell.getValue() || '').replace(/\n/g, ' ');
    if (v.length > maxLen) v = v.slice(0, maxLen) + '…';
    return escapeHtml(v);
  };
}

function listsSummaryFormatter(cell) {
  var lists = cell.getValue() || [];
  if (!lists.length) return '<span style="color:#bbb;">—</span>';
  var totalItems = lists.reduce(function(sum, l) { return sum + ((l.items || []).length); }, 0);
  return lists.length + ' list' + (lists.length > 1 ? 's' : '') + ' · ' + totalItems + ' items';
}

function gameTableColumns() {
  return [
    { rowHandle: true, formatter: "handle", headerSort: false, width: 34, hozAlign: "center", cssClass: "drag-handle-cell" },
    { title: "#", field: "id", width: 40, headerSort: false, cssClass: "readonly" },
    { title: "Title", field: "title", minWidth: 140, formatter: truncateFormatter(60) },
    { title: "Description", field: "description", minWidth: 180, formatter: truncateFormatter(80) },
    { title: "Instructions", field: "instructions", minWidth: 200, formatter: truncateFormatter(90) },
    { title: "Lists", field: "lists", width: 130, headerSort: false, formatter: listsSummaryFormatter },
    {
      formatter: function(cell) { return "<button style='background:none;border:none;color:#e74c3c;cursor:pointer;'><i class='fas fa-trash'></i></button>"; },
      width: 50, hozAlign: "center", headerSort: false, cssClass: "game-delete-cell",
      cellClick: function(e, cell) { cell.getRow().delete(); }
    }
  ];
}

// Tabulator invokes rowClick internally alongside cellClick regardless of
// e.stopPropagation(), so guard by checking what was actually clicked.
function isGameRowActionClick(e) {
  return !!(e.target.closest('.game-delete-cell') || e.target.closest('.drag-handle-cell'));
}

function renumberGameRows(table) {
  if (!table) return;
  table.getRows().forEach(function(row, idx) {
    if (row.getData().id !== idx + 1) row.update({ id: idx + 1 });
  });
}

function renderListBlock(label, itemsText) {
  return '<div class="game-list-block">' +
    '<button type="button" class="game-list-remove-btn" title="Remove list"><i class="fas fa-times-circle"></i></button>' +
    '<div class="form-group" style="margin-bottom:8px;">' +
      '<label style="font-size:12px;">List Label (e.g. "השאלות")</label>' +
      '<input type="text" class="form-control game-list-label" value="' + escapeHtml(label) + '" style="padding:8px 10px;font-size:13px;">' +
    '</div>' +
    '<div class="form-group">' +
      '<label style="font-size:12px;">Items — one per line</label>' +
      '<textarea class="form-control game-list-items-input" rows="4" style="padding:8px 10px;font-size:13px;">' + escapeHtml(itemsText) + '</textarea>' +
    '</div>' +
  '</div>';
}

function bindRemoveListButtons() {
  document.querySelectorAll('.game-list-remove-btn').forEach(function(btn) {
    btn.onclick = function() { btn.closest('.game-list-block').remove(); };
  });
}

function openGameModal(row, tableForNew) {
  var table = row ? row.getTable() : tableForNew;
  var data = row ? row.getData() : { title: '', description: '', materials: '', instructions: '', lists: [] };
  var lists = data.lists || [];
  var listsHtml = lists.map(function(l) {
    return renderListBlock(l.label || '', (l.items || []).join('\n'));
  }).join('');

  Swal.fire({
    title: row ? 'Edit Game' : 'New Game',
    customClass: { popup: 'swal-wide-popup' },
    width: 720,
    html:
      '<div class="modal-grid full-width" style="text-align:right;direction:rtl;">' +
        '<div class="form-group"><label>Title <span class="required">*</span></label>' +
          '<input type="text" id="game-title" class="form-control" value="' + escapeHtml(data.title) + '"></div>' +
        '<div class="form-group"><label>Description</label>' +
          '<textarea id="game-description" class="form-control" rows="2">' + escapeHtml(data.description) + '</textarea></div>' +
        '<div class="form-group"><label>Materials</label>' +
          '<textarea id="game-materials" class="form-control" rows="2">' + escapeHtml(data.materials) + '</textarea></div>' +
        '<div class="form-group"><label>Instructions (how to play)</label>' +
          '<textarea id="game-instructions" class="form-control" rows="5">' + escapeHtml(data.instructions) + '</textarea></div>' +
        '<div class="form-group">' +
          '<label>Question / Item Lists <span style="font-weight:400;color:#888;font-size:12px;">(shown as expandable sections on the card)</span></label>' +
          '<div id="game-lists-container">' + listsHtml + '</div>' +
          '<button type="button" id="game-add-list-btn" class="btn" style="margin-top:6px;padding:6px 12px;font-size:13px;background:#f1f3f5;color:#495057;border:none;border-radius:6px;cursor:pointer;"><i class="fas fa-plus"></i> Add List</button>' +
        '</div>' +
      '</div>',
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: '<i class="fas fa-save"></i> Save',
    confirmButtonColor: '#2e7d32',
    didOpen: function() {
      bindRemoveListButtons();
      document.getElementById('game-add-list-btn').addEventListener('click', function() {
        document.getElementById('game-lists-container').insertAdjacentHTML('beforeend', renderListBlock('', ''));
        bindRemoveListButtons();
      });
    },
    preConfirm: function() {
      var title = document.getElementById('game-title').value.trim();
      if (!title) {
        Swal.showValidationMessage('Title is required');
        return false;
      }
      var newLists = [];
      document.querySelectorAll('.game-list-block').forEach(function(block) {
        var label = block.querySelector('.game-list-label').value.trim();
        var items = block.querySelector('.game-list-items-input').value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
        if (label && items.length) newLists.push({ label: label, items: items });
      });
      return {
        title: title,
        description: document.getElementById('game-description').value.trim(),
        materials: document.getElementById('game-materials').value.trim(),
        instructions: document.getElementById('game-instructions').value.trim(),
        lists: newLists
      };
    }
  }).then(function(result) {
    if (!result.isConfirmed) return;
    if (row) {
      row.update(result.value);
    } else if (table) {
      var maxId = 0;
      table.getData().forEach(function(r) { if (r.id > maxId) maxId = r.id; });
      result.value.id = maxId + 1;
      table.addRow(result.value, true);
    }
  });
}

function switchAdminTab(tabName) {
  document.querySelectorAll('.admin-subtab-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  document.querySelectorAll('.admin-tab-content').forEach(function(content) {
    content.classList.remove('active');
  });

  // Find button by its onclick target
  var btn = Array.from(document.querySelectorAll('.admin-subtab-btn')).find(function(b) {
    return b.getAttribute('onclick').includes("'" + tabName + "'");
  });
  if (btn) btn.classList.add('active');

  var content = document.getElementById('admin-tab-' + tabName);
  if (content) content.classList.add('active');

  // Tables built while their tab was hidden get a zero-width "fitColumns" layout;
  // redraw once the tab (and its real width) is actually visible.
  var tablesByTab = {
    venues: [bacheloretteTable],
    suppliers: [bacheloretteSuppliersTable],
    games: [bacheloretteGamesElegantTable, bacheloretteGamesRowdyTable],
    designs: [bacheloretteDesignsSetsTable, bacheloretteAETable, bachelorettePSTable],
    gifts: [bacheloretteGiftsTable]
  };
  (tablesByTab[tabName] || []).forEach(function(t) {
    if (t) t.redraw(true);
  });
}

function renderEditor() {
  var editorEl = document.getElementById('blog-editor');
  
  // Clean up existing Tabulator tables
  var tablesToDestroy = [
    bacheloretteTable, 
    bacheloretteSuppliersTable, 
    bacheloretteGamesElegantTable, 
    bacheloretteGamesRowdyTable, 
    bacheloretteDesignsSetsTable, 
    bacheloretteAETable,
    bachelorettePSTable,
    bacheloretteGiftsTable
  ];
  tablesToDestroy.forEach(function(t) {
    if (t) {
      try { t.destroy(); } catch(e) {}
    }
  });
  bacheloretteTable = null;
  bacheloretteSuppliersTable = null;
  bacheloretteGamesElegantTable = null;
  bacheloretteGamesRowdyTable = null;
  bacheloretteDesignsSetsTable = null;
  bacheloretteAETable = null;
  bachelorettePSTable = null;
  bacheloretteGiftsTable = null;

  var html = '';

  if (currentSlug === 'bachelorette') {
    editorEl.classList.add('wide');
    document.getElementById('save-bar-bottom').style.display = 'none';
    
    html += '<p class="blog-section-title">Bachelorette Guide Configuration</p>';
    
    // Subtabs Menu
    html += '<div class="admin-subtabs">';
    html += '  <button class="admin-subtab-btn active" onclick="switchAdminTab(\'general\')">General Settings</button>';
    html += '  <button class="admin-subtab-btn" onclick="switchAdminTab(\'venues\')">Venues (Places)</button>';
    html += '  <button class="admin-subtab-btn" onclick="switchAdminTab(\'suppliers\')">Suppliers</button>';
    html += '  <button class="admin-subtab-btn" onclick="switchAdminTab(\'games\')">Party Games</button>';
    html += '  <button class="admin-subtab-btn" onclick="switchAdminTab(\'designs\')">Designs & Links</button>';
    html += '  <button class="admin-subtab-btn" onclick="switchAdminTab(\'gifts\')">Gift Ideas</button>';
    html += '  <button class="btn" onclick="saveBlog()" style="margin-right:auto;padding:6px 12px;font-size:13px;background-color:#5A3A31;color:#fff;"><i class="fas fa-save"></i> Save Changes</button>';
    html += '  <span class="save-msg" id="save-msg-bach" style="margin-left: 8px;">Saved!</span>';
    html += '</div>';

    // Tab 1: General
    html += '<div id="admin-tab-general" class="admin-tab-content active">';
    html += '  <div class="blog-field"><label>Intro Paragraph / Hero Text (Hebrew - Use newlines for line breaks)</label>';
    var introVal = (blogData.intro || '').replace(/</g, '&lt;');
    html += '  <textarea data-key="intro" class="form-control" rows="4" style="width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;">' + introVal + '</textarea></div>';
    html += '  <div class="blog-field"><label>Warning / Header Note (Hebrew)</label>';
    var noteVal = (blogData.note || '').replace(/</g, '&lt;');
    html += '  <input type="text" data-key="note" class="form-control" value="' + noteVal + '" style="width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-family:inherit;font-size:14px;"></div>';
    html += '  <div class="blog-field"><label>Games Section Intro Text (Hebrew)</label>';
    var gamesIntroVal = (blogData.games_intro || '').replace(/</g, '&lt;');
    html += '  <textarea data-key="games_intro" class="form-control" rows="2" style="width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;">' + gamesIntroVal + '</textarea></div>';
    html += '</div>';

    // Tab 2: Venues (Places)
    html += '<div id="admin-tab-venues" class="admin-tab-content">';
    html += '  <div style="display:flex;align-items:center;margin-bottom:15px;gap:12px;">';
    html += '    <h3 style="margin:0;font-size:16px;font-weight:700;">Places & Venues</h3>';
    html += '    <button class="btn btn-success" onclick="addBacheloretteRow(\'venues\')" style="margin-left:auto;padding:6px 12px;font-size:13px;"><i class="fas fa-plus"></i> Add New Place</button>';
    html += '  </div>';
    html += '  <div id="bachelorette-table" style="min-height:300px;"></div>';
    html += '</div>';

    // Tab 3: Suppliers
    html += '<div id="admin-tab-suppliers" class="admin-tab-content">';
    html += '  <div style="display:flex;align-items:center;margin-bottom:15px;gap:12px;">';
    html += '    <h3 style="margin:0;font-size:16px;font-weight:700;">Suppliers Directory</h3>';
    html += '    <button class="btn btn-success" onclick="addBacheloretteRow(\'suppliers\')" style="margin-left:auto;padding:6px 12px;font-size:13px;"><i class="fas fa-plus"></i> Add New Supplier</button>';
    html += '  </div>';
    html += '  <div id="bachelorette-suppliers-table" style="min-height:300px;"></div>';
    html += '</div>';

    // Tab 4: Games
    html += '<div id="admin-tab-games" class="admin-tab-content">';
    html += '  <p class="games-hint"><i class="fas fa-circle-info"></i> Click a row to edit all fields (including question/task lists). Drag the <i class="fas fa-grip-vertical"></i> handle to reorder — the order here matches the card order on the site.</p>';
    html += '  <div style="margin-bottom:30px;">';
    html += '    <div style="display:flex;align-items:center;margin-bottom:15px;gap:12px;">';
    html += '      <h3 style="margin:0;font-size:16px;font-weight:700;">✨ Elegant Games (רווקה קלאסית ואלגנטית)</h3>';
    html += '      <button class="btn btn-success" onclick="addBacheloretteRow(\'games_elegant\')" style="margin-left:auto;padding:6px 12px;font-size:13px;"><i class="fas fa-plus"></i> Add Elegant Game</button>';
    html += '    </div>';
    html += '    <div id="bachelorette-games-elegant-table" style="min-height:200px;"></div>';
    html += '  </div>';
    html += '  <div>';
    html += '    <div style="display:flex;align-items:center;margin-bottom:15px;gap:12px;">';
    html += '      <h3 style="margin:0;font-size:16px;font-weight:700;">🥂 Rowdy Games (פרועה ומרימה)</h3>';
    html += '      <button class="btn btn-success" onclick="addBacheloretteRow(\'games_rowdy\')" style="margin-left:auto;padding:6px 12px;font-size:13px;"><i class="fas fa-plus"></i> Add Rowdy Game</button>';
    html += '    </div>';
    html += '    <div id="bachelorette-games-rowdy-table" style="min-height:200px;"></div>';
    html += '  </div>';
    html += '</div>';

    // Tab 5: Designs
    html += '<div id="admin-tab-designs" class="admin-tab-content">';
    html += '  <div style="margin-bottom:30px;">';
    html += '    <div style="display:flex;align-items:center;margin-bottom:15px;gap:12px;">';
    html += '      <h3 style="margin:0;font-size:16px;font-weight:700;">🎨 Canva Design Sets</h3>';
    html += '      <button class="btn btn-success" onclick="addBacheloretteRow(\'designs_sets\')" style="margin-left:auto;padding:6px 12px;font-size:13px;"><i class="fas fa-plus"></i> Add Canva Set</button>';
    html += '    </div>';
    html += '    <div id="bachelorette-designs-sets-table" style="min-height:200px;"></div>';
    html += '  </div>';
    
    // AliExpress Static texts & links
    html += '  <hr style="margin:25px 0; border:none; border-top:1px solid #ddd;">';
    html += '  <h3 style="margin-bottom:15px;font-size:16px;font-weight:700;">📦 AliExpress Recommendations</h3>';
    html += '  <div class="blog-field"><label>AliExpress Section Intro Text (Hebrew)</label>';
    var aeText = ((blogData.designs || {}).aliexpress_text || '').replace(/</g, '&lt;');
    html += '  <textarea id="designs-ae-text" class="form-control" rows="2" style="width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;">' + aeText + '</textarea></div>';
    html += '  <div style="display:flex;align-items:center;margin-bottom:15px;gap:12px;">';
    html += '    <label style="margin:0;font-weight:600;font-size:13px;color:#555;">AliExpress Items Links Table</label>';
    html += '    <button class="btn btn-success" onclick="addBacheloretteRow(\'ae_links\')" style="margin-left:auto;padding:4px 10px;font-size:12px;"><i class="fas fa-plus"></i> Add AliExpress Item</button>';
    html += '  </div>';
    html += '  <div id="bachelorette-ae-table" style="min-height:150px;margin-bottom:30px;"></div>';

    // Print shops Static texts & links
    html += '  <hr style="margin:25px 0; border:none; border-top:1px solid #ddd;">';
    html += '  <h3 style="margin-bottom:15px;font-size:16px;font-weight:700;">🖨️ Tel Aviv Print Shops</h3>';
    html += '  <div class="blog-field"><label>Print Shops Section Intro Text (Hebrew)</label>';
    var psText = ((blogData.designs || {}).print_shops_text || '').replace(/</g, '&lt;');
    html += '  <textarea id="designs-ps-text" class="form-control" rows="2" style="width:100%;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;">' + psText + '</textarea></div>';
    html += '  <div style="display:flex;align-items:center;margin-bottom:15px;gap:12px;">';
    html += '    <label style="margin:0;font-weight:600;font-size:13px;color:#555;">Print Shops Links Table</label>';
    html += '    <button class="btn btn-success" onclick="addBacheloretteRow(\'ps_links\')" style="margin-left:auto;padding:4px 10px;font-size:12px;"><i class="fas fa-plus"></i> Add Print Shop</button>';
    html += '  </div>';
    html += '  <div id="bachelorette-ps-table" style="min-height:150px;"></div>';

function addBacheloretteRow(type) {
  if (type === 'games_elegant') {
    openGameModal(null, bacheloretteGamesElegantTable);
    return;
  }
  if (type === 'games_rowdy') {
    openGameModal(null, bacheloretteGamesRowdyTable);
    return;
  }

  var table = null;
  var defaultRow = {};

  if (type === 'venues' && bacheloretteTable) {
    table = bacheloretteTable;
    defaultRow = { name: "שם המקום החדש", category: "חלל ושף", description: "", location: "", price: "", link: "#", link_text: "", instagram: "https://instagram.com/", whatsapp: "" };
  } else if (type === 'suppliers' && bacheloretteSuppliersTable) {
    table = bacheloretteSuppliersTable;
    defaultRow = { name: "שם הספק החדש", category: "דיג׳יי", location: "", price: "", instagram: "https://instagram.com/", whatsapp: "", description: "" };
  } else if (type === 'designs_sets' && bacheloretteDesignsSetsTable) {
    table = bacheloretteDesignsSetsTable;
    defaultRow = { name: "סט מיתוג חדש", description: "", canva_link: "https://www.canva.com/" };
  } else if (type === 'ae_links' && bacheloretteAETable) {
    table = bacheloretteAETable;
    defaultRow = { name: "מוצר אליאקספרס חדש", url: "https://aliexpress.com/" };
  } else if (type === 'ps_links' && bachelorettePSTable) {
    table = bachelorettePSTable;
    defaultRow = { name: "בית דפוס חדש", url: "https://google.com/" };
  } else if (type === 'gifts' && bacheloretteGiftsTable) {
    table = bacheloretteGiftsTable;
    defaultRow = { title: "רעיון חדש למתנה", description: "", buy_url: "", buy_text: "לרכישה" };
  }
  
  if (table) {
    var maxId = 0;
    table.getData().forEach(function(r) {
      if (r.id > maxId) maxId = r.id;
    });
    defaultRow.id = maxId + 1;
    table.addRow(defaultRow, true);
  }
}

function collectData() {
  if (currentSlug === 'bachelorette') {
    // 1. Clean places
    var placesRaw = bacheloretteTable ? bacheloretteTable.getData() : [];
    var cleanPlaces = JSON.parse(JSON.stringify(placesRaw));
    cleanPlaces.forEach(function(p) { delete p.id; });

    // 2. Clean suppliers
    var suppliersRaw = bacheloretteSuppliersTable ? bacheloretteSuppliersTable.getData() : [];
    var cleanSuppliers = JSON.parse(JSON.stringify(suppliersRaw));
    cleanSuppliers.forEach(function(s) { delete s.id; });

    // 3. Clean games
    var elegantRaw = bacheloretteGamesElegantTable ? bacheloretteGamesElegantTable.getData() : [];
    var cleanElegant = JSON.parse(JSON.stringify(elegantRaw));
    cleanElegant.forEach(function(g) { delete g.id; });

    var rowdyRaw = bacheloretteGamesRowdyTable ? bacheloretteGamesRowdyTable.getData() : [];
    var cleanRowdy = JSON.parse(JSON.stringify(rowdyRaw));
    cleanRowdy.forEach(function(g) { delete g.id; });

    // 4. Clean design sets
    var setsRaw = bacheloretteDesignsSetsTable ? bacheloretteDesignsSetsTable.getData() : [];
    var cleanSets = JSON.parse(JSON.stringify(setsRaw));
    cleanSets.forEach(function(ds) { delete ds.id; });

    // 5. Clean AliExpress and print shops lists
    var aeRaw = bacheloretteAETable ? bacheloretteAETable.getData() : [];
    var cleanAE = JSON.parse(JSON.stringify(aeRaw));
    cleanAE.forEach(function(link) { delete link.id; });

    var psRaw = bachelorettePSTable ? bachelorettePSTable.getData() : [];
    var cleanPS = JSON.parse(JSON.stringify(psRaw));
    cleanPS.forEach(function(link) { delete link.id; });

    // 6. Clean gifts
    var giftsRaw = bacheloretteGiftsTable ? bacheloretteGiftsTable.getData() : [];
    var cleanGifts = JSON.parse(JSON.stringify(giftsRaw));
    cleanGifts.forEach(function(g) { delete g.id; });

    return {
      intro: document.querySelector('[data-key="intro"]').value,
      note: document.querySelector('[data-key="note"]').value,
      games_intro: document.querySelector('[data-key="games_intro"]').value,
      gifts_title: document.querySelector('[data-key="gifts_title"]').value,
      gifts_desc: document.querySelector('[data-key="gifts_desc"]').value,
      places: cleanPlaces,
      suppliers: cleanSuppliers,
      games: {
        elegant: cleanElegant,
        rowdy: cleanRowdy
      },
      designs: {
        sets: cleanSets,
        aliexpress_text: document.getElementById('designs-ae-text').value,
        aliexpress_links: cleanAE,
        print_shops_text: document.getElementById('designs-ps-text').value,
        print_shops_links: cleanPS
      },
      gifts: cleanGifts
    };
  }

  var out = JSON.parse(JSON.stringify(blogData));
  document.querySelectorAll('[data-key]').forEach(function(el) {
    out[el.dataset.key] = el.value;
  });
  if (!out.cities) out.cities = {};
  document.querySelectorAll('[data-city]').forEach(function(el) {
    var city = el.dataset.city;
    var sub = el.dataset.sub;
    if (!out.cities[city]) out.cities[city] = {};
    out.cities[city][sub] = el.value;
  });
  return out;
}

function loadBlog() {
  var slug = document.getElementById('blog-slug').value;
  currentSlug = slug;
  fetch('/admin/api/blog/' + slug)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      blogData = data;
      renderEditor();
    })
    .catch(function() {
      document.getElementById('blog-editor').innerHTML = '<p style="color:red">Failed to load blog data.</p>';
    });
}

function saveBlog() {
  var data = collectData();
  fetch('/admin/api/blog/' + currentSlug, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.ok) {
      var msgId = currentSlug === 'bachelorette' ? 'save-msg-bach' : 'save-msg-bottom';
      var msg = document.getElementById(msgId);
      if (msg) {
        msg.style.display = 'inline';
        setTimeout(function() { msg.style.display = 'none'; }, 2500);
      }
    } else {
      alert('Error: ' + (res.error || 'unknown'));
    }
  })
  .catch(function() { alert('Save failed.'); });
}

document.getElementById('blog-slug').addEventListener('change', loadBlog);
window.addEventListener('load', loadBlog);
</script>
