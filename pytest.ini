[pytest]
# Repo root on the path so `whatsapp_bot` / `instagram_automation` import.
pythonpath = .
testpaths = tests
addopts = --import-mode=importlib
# datetime.utcnow() is the codebase-wide convention (IG models, app.py, plan §4);
# silence only its Python 3.13 deprecation so test output stays pristine.
filterwarnings =
    ignore:datetime.datetime.utcnow\(\) is deprecated:DeprecationWarning
