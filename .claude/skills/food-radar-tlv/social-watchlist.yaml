# ---------------------------------------------------------------------------------------------
# CREATIVE COMBINATION BANK — improvise around these every run to surface pop-ups & interesting
# one-offs. Mix a TRIGGER with an ANGLE + "תל אביב"/"Tel Aviv" (and run HE + EN). Invent fresh
# combos each run; rotate so you don't fetch the same result set twice.
# ---------------------------------------------------------------------------------------------
combination_bank:
  triggers_he: [ "פופ אפ", "ערב חד פעמי", "סופט אופנינג", "הרצה", "פתיחה בקרוב", "השבוע נפתח",
                 "קולאב", "שיתוף פעולה", "ארוחת שף", "ערב אורח", "guest chef", "טייק אובר",
                 "סוף שבוע בלבד", "לזמן מוגבל", "חדש בשכונה", "בקרוב נפתח", "דרושים צוות הקמה" ]
  triggers_en: [ "pop-up", "soft opening", "one night only", "guest chef", "chef takeover",
                 "collab dinner", "secret dinner", "supper club", "opening soon", "now open",
                 "this week only", "limited time", "new in town", "hidden", "speakeasy" ]
  angles:      [ "טאקו/taco", "ראמן/ramen", "נטורל יין/natural wine", "מאצ'ה/matcha", "ביסטרו/bistro",
                 "מאפייה/bakery", "גלידה/gelato", "קוקטייל בר/cocktail bar", "אסאדו/asado",
                 "סושי/sushi handroll", "פיצה נפוליטנה/napoletana", "בראנץ'/brunch", "רוף טופ/rooftop" ]
  neighborhoods: [ "פלורנטין/Florentin", "נווה צדק/Neve Tzedek", "כרם התימנים/Kerem", "יפו/Jaffa",
                   "לב העיר/Lev Hair", "מונטיפיורי/Montefiore", "שוק לוינסקי/Levinsky", "נמל ת\"א/TLV Port",
                   "רוטשילד/Rothschild", "כיכר דיזנגוף/Dizengoff" ]
  # Examples to riff on (run, then invent more):
  #   site:instagram.com "פופ אפ" "פלורנטין" טאקו
  #   site:instagram.com "guest chef" "Tel Aviv" "one night"
  #   site:tiktok.com "סופט אופנינג" "תל אביב" בר
  #   site:instagram.com "natural wine" "Jaffa" "now open"
  #   site:instagram.com (<top_chef name>) "פופ אפ" OR "ערב חד פעמי"

# Usage rules:
#   - Social is the PRIMARY discovery engine — run it heavily and creatively every run.
#   - Date each hit by its body date OR its posted/published date (SKILL.md §5 Dating rule).
#   - Treat social hits as leads: verify the entity against web / reservation / media before
#     reporting, and never output a social finding without a proof URL.
#   - Search indexed public mentions only; do not log in or collect private personal data.
