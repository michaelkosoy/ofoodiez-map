# social-watchlist.yaml — food-radar-tlv
#
# Social media is the PRIMARY DISCOVERY ENGINE for this skill (see SKILL.md §6). Lean on it
# heavily every run — it is the fastest source for pop-ups, soft launches, chef collabs and
# one-off events, usually days/weeks before media or reservation platforms catch up.
#
# Use INDEXED PUBLIC SEARCH ONLY (Tavily). Do NOT log in, scrape private data, or collect personal
# data beyond a public handle/page name and a public URL. See compliance.md.
#
# The names below are SEARCH SEEDS — searching a chef/group/restaurant NAME works whether or not we
# know the exact @handle. Add verified public @handles next to a name as you discover them. Never
# invent a handle; if unsure, search the name.

